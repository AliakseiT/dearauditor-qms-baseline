  adopter_specific_or_tailored:
    - clause: "4 context of the organization"
      rationale: "The upstream baseline provides the governance method and example context. Each adopter must tailor company context, interested parties, scope, and climate relevance before operational use."
    - clause: "5.1.2 customer focus"
      rationale: "Customer focus is implemented through governance, feedback, satisfaction monitoring, and management review, but customer segments, contractual requirements, and satisfaction indicators are adopter-specific."
    - clause: "6.1 risks and opportunities"
      rationale: "The baseline routes QMS process risks, opportunities, adverse trends, and improvement actions through governance, metrics, change control, and CAPA. Product, service, and business-specific risks remain adopter-owned."
    - clause: "7.1.6 organizational knowledge"
      rationale: "Knowledge retention and transfer are controlled through document control, training, governance records, and lessons learned. Exact knowledge assets and owners are company-specific."
    - clause: "8 operation"
      rationale: "The baseline defines reusable software/service lifecycle, supplier, release, and nonconformity controls. Actual customer requirements, acceptance criteria, service delivery controls, and release records are completed in the adopter's controlled repositories."
  outstanding_gaps: []
