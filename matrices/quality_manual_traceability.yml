additional_definitions_required:
  - item: "Regulatory market scope and jurisdiction register"
    reason: "Defines country-specific obligations feeding QMS controls and reporting timelines."
  - item: "Device classification and intended use statement registry"
    reason: "Anchors risk management depth and lifecycle evidence expectations."
  - item: "Digital tool inventory with validation status"
    reason: "Supports ISO 13485 4.1.6 validation of software used in the QMS."
  - item: "Business continuity and infrastructure resilience baseline"
    reason: "Supports infrastructure/service continuity controls and clause 6.3 obligations."
  - item: "Supplier criticality model and re-evaluation schedule"
    reason: "Defines objective thresholds for approved supplier lifecycle decisions."
