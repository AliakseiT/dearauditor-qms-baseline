supporting_definitions:
  - item: "Regulatory market scope register"
    status: "implemented"
    reference: "matrices/regulatory_market_scope.yml"
    note: "Exact CH/EU/US SaMD references are defined and version-controlled."
  - item: "Product-specific intended use and classification dossier"
    status: "required_per_product"
    reference: "<product-or-study-repo>/records/mdf/*"
    note: "No single device intent is defined at company level; product/study repositories hold their MDF execution dossiers."
  - item: "QMS software tool inventory and validation"
    status: "implemented"
    reference: "matrices/qms_tooling_inventory.yml"
    note: "QMS digital tooling is currently GitHub-only."
  - item: "Infrastructure control baseline"
    status: "implemented_with_product_specific_extensions"
    reference: "sops/SOP-017-InfrastructureAndMaintenanceControl.md"
    note: "Company baseline exists; each product maintains runtime-specific controls in product dossier."
  - item: "Supplier criticality and approved supplier lifecycle model"
    status: "implemented"
    reference: "sops/SOP-010-SupplierAndPurchasingControl.md"
    note: "Supplier model and approved supplier list maintenance are active controls."
  - item: "Integrated risk management baseline (hazard, failure mode, cybersecurity)"
    status: "implemented"
    reference: "sops/SOP-018-RiskManagement.md"
    note: "Uses one risk process and one risk file structure for software-specific lifecycle control."
  - item: "Usability engineering baseline and usability file model"
    status: "implemented"
    reference: "sops/SOP-019-UsabilityEngineering.md, <product-or-study-repo>/records/usability/*"
    note: "The upstream baseline defines governance; usability-file execution records are maintained in designated product/study repositories and signed with the same Part 11 mechanism."
  - item: "Software lifecycle and release baseline model"
    status: "implemented"
    reference: "sops/SOP-020-SoftwareLifecycleConfigurationAndReleaseManagement.md, wis/WI-001-VerificationAndValidationExecution.md, wis/WI-002-ConfigurationAndReleaseManagementExecution.md"
    note: "IEC 62304 lifecycle planning, GitHub-native V&V approval, and release-baseline control are part of the controlled QMS baseline."
