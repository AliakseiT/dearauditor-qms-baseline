version: 2
standard:
  exact_name: "EVS-EN ISO 13485:2016+A11:2021 Medical devices - Quality management systems - Requirements for regulatory purposes"
  normative_base: "ISO 13485:2016"
additional_standards:
  - exact_name: "EVS-EN ISO 14971:2019+A11:2021 Medical devices - Application of risk management to medical devices"
    normative_base: "ISO 14971:2019"
  - exact_name: "EVS-EN 62366-1:2015+A1:2020 Medical devices - Part 1: Application of usability engineering to medical devices"
    normative_base: "IEC 62366-1:2015+A1:2020"
company_reference: "matrices/company_profile.yml"
regulatory_scope_reference: "matrices/regulatory_market_scope.yml"
qms_tooling_reference: "matrices/qms_tooling_inventory.yml"
quality_manual_document: "docs/QM-001-Quality-Manual.md"
qms_scope:
  included_activities:
    - "QMS governance and document control"
    - "Design/development and medical device file control"
    - "Verification and validation execution"
    - "Configuration management and release baseline control"
    - "Supplier qualification and purchasing lifecycle"
    - "Risk management including cybersecurity risk"
    - "Usability engineering for safety-related UI"
    - "Feedback, complaint, PMS, and incident processes"
    - "Nonconformity control, CAPA, audit, metrics, management review"
  justified_non_applications:
    - clause: "7.5.2"
      rationale: "No physical product manufacturing or contamination-control processes."
    - clause: "7.5.3.2.2"
      rationale: "No on-site installation by company baseline; product dossier may override."
    - clause: "7.5.5"
      rationale: "No sterile medical devices in company baseline scope."
    - clause: "7.5.7"
      rationale: "No sterilization processes in company baseline scope."
    - clause: "7.5.8"
      rationale: "No implantable devices in company baseline scope."
quality_manual_sections:
  - section_id: QM-01
    section_name: "QMS context, scope, and process map"
    iso_clauses: ["4.1", "4.2.1", "4.2.2"]
    controlling_sops: ["SOP-005", "SOP-001"]
    work_instructions: ["WI-001"]
    status: "implemented"
  - section_id: QM-02
    section_name: "Documented information control"
    iso_clauses: ["4.2.4", "4.2.5"]
    controlling_sops: ["SOP-001"]
    work_instructions: ["WI-001"]
    status: "implemented"
  - section_id: QM-03
    section_name: "Management commitment, policy, objectives"
    iso_clauses: ["5.1", "5.3", "5.4.1", "5.4.2"]
    controlling_sops: ["SOP-004", "SOP-005", "SOP-016"]
    work_instructions: ["WI-008"]
    status: "implemented"
  - section_id: QM-04
    section_name: "Responsibility, authority, communication"
    iso_clauses: ["5.5.1", "5.5.2", "5.5.3"]
    controlling_sops: ["SOP-005", "SOP-011"]
    work_instructions: ["WI-008"]
    status: "implemented"
  - section_id: QM-05
    section_name: "Management review"
    iso_clauses: ["5.6.1", "5.6.2", "5.6.3"]
    controlling_sops: ["SOP-004"]
    work_instructions: ["WI-008"]
    status: "implemented"
  - section_id: QM-06
    section_name: "Human resources and competence"
    iso_clauses: ["6.2"]
    controlling_sops: ["SOP-011"]
    work_instructions: ["WI-008"]
    status: "implemented"
  - section_id: QM-07
    section_name: "Infrastructure and work environment"
    iso_clauses: ["6.3", "6.4"]
    controlling_sops: ["SOP-017"]
    work_instructions: ["WI-003"]
    status: "implemented"
  - section_id: QM-08
    section_name: "Design and development controls"
    iso_clauses: ["7.1", "7.3"]
    controlling_sops: ["SOP-008", "SOP-009", "SOP-007"]
