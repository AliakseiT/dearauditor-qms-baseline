supporting_definitions:
  - item: "Regulatory market scope register"
    status: "implemented"
    reference: "matrices/regulatory_market_scope.yml"
    note: "Exact CH/EU/US SaMD references are defined and version-controlled."
  - item: "Product-specific intended use and classification dossier"
    status: "required_per_product"
    reference: "product repository docs/regulatory/*"
    note: "No single device intent is defined at company level."
  - item: "QMS software tool inventory and validation"
    status: "implemented"
    reference: "matrices/qms_tooling_inventory.yml"
    note: "QMS digital tooling is currently GitHub-only."
  - item: "Infrastructure control baseline"
    status: "implemented_with_product_specific_extensions"
    reference: "sops/SOP-017-InfrastructureAndMaintenanceControl.md"
    note: "Company baseline exists; each product maintains runtime-specific controls in product dossier."
  - item: "Supplier criticality and approved supplier lifecycle model"
    status: "implemented"
    reference: "sops/SOP-010-SupplierAndPurchasingControl.md"
    note: "Supplier model and approved supplier list maintenance are active controls."
