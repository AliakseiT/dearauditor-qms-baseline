version: 1
owner_role: management_representative
last_reviewed_on: "2026-06-14"
status: optional_adoption_aid

disclaimer: >-
  Adoption profiles are OPTIONAL aids for tailoring the DearAuditor Open QMS
  Baseline to an adopter's operating model. They select and explain which
  baseline areas, controlled documents, gap analyses, and record families are
  typically relevant for a given kind of product or use case. Profiles do NOT
  make any product-specific control mandatory for every adopter, do NOT change
  the product-independent upstream baseline, and are NOT regulatory advice. Each
  adopter remains responsible for determining product qualification,
  classification, applicable regulations, and the controls it must operate, and
  for keeping its own operational QMS evidence separate from this public
  baseline.

references:
  company_profile: matrices/company_profile.yml
  regulatory_market_scope: matrices/regulatory_market_scope.yml
  how_to_apply: docs/adoption/README.md

# The core baseline applies to EVERY profile. Profiles only add layers on top of
# this spine; they never remove a core control.
core_baseline:
  description: >-
    Product-independent QMS spine that every adopter operates regardless of
    product type. Derived from the SOP sets common to the baseline's core
    management-system gap analyses, plus the GitHub-native QMS tooling controls.
  quality_manual: qm/QM-001-QualityManual.md
  sops:
    - SOP-001  # Document control
    - SOP-002  # CAPA
    - SOP-003  # Internal audit
    - SOP-004  # Management review
    - SOP-005  # QMS governance
    - SOP-006  # Software validation (QMS tooling / computerized systems)
    - SOP-009  # Change management
    - SOP-010  # Supplier and purchasing control
    - SOP-011  # Competence, training and awareness
    - SOP-016  # Quality metrics and data analysis
    - SOP-017  # Infrastructure and maintenance control
    - SOP-020  # Software lifecycle, configuration and release management
  gap_analyses:
    - matrices/iso_9001_gap_analysis.yml
  record_families:
    - records/audits
    - records/capas
    - records/change
    - records/configuration
    - records/management-reviews
    - records/releases
    - records/suppliers
    - records/training
    - records/validation
    - records/verification_validation
  qms_intent_standards:
    - "ISO 9001:2015 (incl. Amd 1:2024)"

profiles:
  - id: ai_diagnostic
    name: "AI-based diagnostic (regulated SaMD with AI)"
    # baseline_coverage: how much of this profile's control set the baseline
    # already provides. full = all controls present; partial = a control layer
    # is adopter-supplied; minimal = most of the specialised layer is adopter-supplied.
    baseline_coverage: full
    intended_for: >-
      Software intended for a medical purpose (diagnosis, screening, triage,
      decision support) that embeds AI/ML components and qualifies as a medical
      device (SaMD). This is the most complete profile: the full baseline plus
      the AI management layer.
    not_for:
      - Non-device wellness or general digital-health apps (see digital_health_app).
      - Software with AI features but no medical purpose (see app_with_ai).
    adds_sops:
      - SOP-007  # Medical device file control
      - SOP-008  # Design and development control
      - SOP-013  # Regulatory incident reporting
      - SOP-014  # Post-market surveillance
      - SOP-015  # Nonconforming product control
      - SOP-018  # Risk management
      - SOP-019  # Usability engineering
      - SOP-021  # Information security management
      - SOP-022  # AI management system
      - SOP-023  # Data protection and privacy management
    gap_analyses:
      - matrices/iso_13485_gap_analysis.yml
      - matrices/iso_14971_gap_analysis.yml
      - matrices/iec_62304_gap_analysis.yml
      - matrices/iec_62366_1_gap_analysis.yml
      - matrices/iec_82304_1_gap_analysis.yml
      - matrices/iso_iec_42001_gap_analysis.yml
      - matrices/iso_27001_gap_analysis.yml
      - matrices/gdpr_gap_analysis.yml
      - matrices/swiss_nfadp_gap_analysis.yml
      - matrices/privacy_data_protection_gap_index.yml
      - matrices/regulatory_market_scope.yml
    record_families:
      - records/mdf
      - records/design
      - records/risk
      - records/usability
      - records/incidents
      - records/pms
      - records/nonconformity
      - records/aims
      - records/isms
      - records/privacy
    qms_intent_standards:
      - "ISO 13485:2016 (+A11:2021)"
      - "ISO 14971:2019 (+A11:2021)"
      - "IEC 62304:2006 (+A1:2015)"
      - "IEC 62366-1:2015 (+A1:2020)"
      - "IEC 82304-1:2016"
      - "ISO/IEC 42001:2023"
      - "ISO/IEC 27001:2022 (incl. Amd 1:2024)"
      - "GDPR / Swiss nFADP (where in scope)"
    boundary: >-
      Device qualification and classification must be determined per
      matrices/regulatory_market_scope.yml before development and release. The
      AI layer (SOP-022, ISO/IEC 42001) applies to AI components inside the
      device and to AI-bearing supplier interfaces.
    escalation: []
    adopter_must_provide:
      - Product intended use, indications, claims, and regulatory classification.
      - Conformity route and notified-body / regulator interactions for the target markets.

  - id: app_with_ai
    name: "App with AI (non-device software product with AI features)"
    baseline_coverage: full
    intended_for: >-
      A general software product that embeds AI/ML features but has no medical
      purpose and does not qualify as a medical device. Distinguishing layer is
      AI management plus security and privacy.
    not_for:
      - Software intended for a medical purpose (see ai_diagnostic).
      - Products making any diagnostic, therapeutic, or clinical claim.
    adds_sops:
      - SOP-019  # Usability engineering (optional good practice)
      - SOP-021  # Information security management
      - SOP-022  # AI management system
      - SOP-023  # Data protection and privacy management
    gap_analyses:
      - matrices/iso_iec_42001_gap_analysis.yml
      - matrices/iso_27001_gap_analysis.yml
      - matrices/gdpr_gap_analysis.yml
      - matrices/swiss_nfadp_gap_analysis.yml
      - matrices/privacy_data_protection_gap_index.yml
    record_families:
      - records/aims
      - records/isms
      - records/privacy
      - records/usability  # optional
    qms_intent_standards:
      - "ISO 9001:2015 (incl. Amd 1:2024)"
      - "ISO/IEC 42001:2023"
      - "ISO/IEC 27001:2022 (incl. Amd 1:2024)"
      - "GDPR / Swiss nFADP (where personal data is processed)"
    boundary: >-
      Explicitly NOT a medical device: the ISO 13485 / IEC 62304 / IEC 62366-1
      medical-device controls and the medical device file are out of scope
      unless the product later acquires a medical purpose.
    escalation:
      - to: ai_diagnostic
        when: >-
          AI output is used for a medical purpose or the product makes a
          diagnostic/therapeutic claim; the product then qualifies as SaMD.
    adopter_must_provide:
      - Confirmation that the product makes no medical claim and is out of device scope.

  - id: digital_health_app
    name: "Digital health app (non-device / wellness boundary)"
    baseline_coverage: full
    intended_for: >-
      A consumer or professional digital-health / wellness application that
      processes health-adjacent personal data but does NOT make a medical claim
      and does not qualify as a medical device. Privacy and security are the
      load-bearing layers, with product-safety good practice for health software.
    not_for:
      - Software intended for a medical purpose or making a medical claim (see ai_diagnostic).
    adds_sops:
      - SOP-019  # Usability engineering (optional good practice)
      - SOP-021  # Information security management
      - SOP-023  # Data protection and privacy management
    gap_analyses:
      - matrices/iso_27001_gap_analysis.yml
      - matrices/iec_82304_1_gap_analysis.yml
      - matrices/gdpr_gap_analysis.yml
      - matrices/swiss_nfadp_gap_analysis.yml
      - matrices/privacy_data_protection_gap_index.yml
    record_families:
      - records/isms
      - records/privacy
      - records/usability  # optional
    qms_intent_standards:
      - "ISO 9001:2015 (incl. Amd 1:2024)"
      - "ISO/IEC 27001:2022 (incl. Amd 1:2024)"
      - "IEC 82304-1:2016 (health-software product safety, good practice)"
      - "GDPR / Swiss nFADP"
    boundary: >-
      Maintain an explicit non-device / wellness boundary. The product must not
      make a diagnostic, therapeutic, or other medical claim without first
      re-qualifying it. IEC 82304-1 is applied as health-software product-safety
      good practice, not as evidence of device conformity.
    escalation:
      - to: ai_diagnostic
        when: >-
          The product makes a medical claim or is intended for a medical purpose
          (becomes SaMD).
      - to: app_with_ai
        when: >-
          The product embeds AI/ML features; additionally adopt the AI
          management layer (SOP-022, ISO/IEC 42001).
    adopter_must_provide:
      - Documented non-device determination and the basis for the wellness boundary.

  - id: in_house_clinical_software
    name: "Software developed in-house in a clinic (health-institution / own use)"
    baseline_coverage: partial
    intended_for: >-
      Software developed and used inside a single health institution (e.g. a
      clinic or hospital) for its own patients rather than placed on the market.
      The baseline supplies general medical-software lifecycle, risk, usability,
      security, and privacy controls that such software still needs.
    not_for:
      - Software placed on the market or supplied to other organisations (see ai_diagnostic).
    adds_sops:
      - SOP-008  # Design and development control (scaled to the in-house context)
      - SOP-012  # Feedback and complaint handling (internal user feedback)
      - SOP-014  # Post-market surveillance (scaled internal monitoring)
      - SOP-018  # Risk management
      - SOP-019  # Usability engineering
      - SOP-021  # Information security management
      - SOP-023  # Data protection and privacy management
    gap_analyses:
      - matrices/iso_14971_gap_analysis.yml
      - matrices/iec_62304_gap_analysis.yml
      - matrices/iec_62366_1_gap_analysis.yml
      - matrices/iso_27001_gap_analysis.yml
      - matrices/gdpr_gap_analysis.yml
      - matrices/swiss_nfadp_gap_analysis.yml
      - matrices/privacy_data_protection_gap_index.yml
      - matrices/regulatory_market_scope.yml
    record_families:
      - records/design
      - records/risk
      - records/usability
      - records/isms
      - records/privacy
      - records/feedback
      - records/pms
      - records/mdf  # for the in-house justification record below
    record_templates_added:
      - records/mdf/in_house_health_institution_justification_template.md
    qms_intent_standards:
      - "ISO 9001:2015 (incl. Amd 1:2024)"
      - "ISO 14971:2019 (+A11:2021)"
      - "IEC 62304:2006 (+A1:2015), tailored to the in-house context"
      - "IEC 62366-1:2015 (+A1:2020)"
      - "ISO/IEC 27001:2022 (incl. Amd 1:2024)"
      - "GDPR / Swiss nFADP"
    boundary: >-
      ISO 13485 certification is optional here and is applied (if at all) as good
      practice rather than as a market-access requirement. The device-vs-non-device
      qualification question is still resolved per matrices/regulatory_market_scope.yml.
    escalation:
      - to: ai_diagnostic
        when: >-
          The software is placed on the market, supplied to other organisations,
          or otherwise leaves the in-house / own-use boundary.
    adopter_must_provide:
      - >-
        The regulatory basis for the in-house / own-use pathway in the adopter's
        own jurisdiction (for example, the applicable health-institution or
        own-device provisions). The baseline does NOT pre-assert any specific
        exemption clause; the adopter records its determination in the in-house
        justification record.
      - The determination that no suitable equivalent device is available, where the chosen pathway requires it.
      - The internal-use boundary and the conditions under which the software may be used.

  - id: clinical_trial_software
    name: "Clinical-trial / study-support software (computerized system in research)"
    baseline_coverage: minimal
    intended_for: >-
      Software used as a computerized system in clinical research (e.g. data
      capture, study management, ePRO). The baseline supplies QMS tooling
      validation, lifecycle, security, and privacy controls; the clinical-research
      regulatory layer is NOT part of the baseline and must be supplied by the adopter.
    not_for:
      - Default adoption. Per issue #373 this profile is optional and selected explicitly.
    adds_sops:
      - SOP-021  # Information security management
      - SOP-023  # Data protection and privacy management
    work_instructions:
      - wis/WI-001-VerificationAndValidationExecution.md
      - wis/WI-002-ConfigurationAndReleaseManagementExecution.md
    gap_analyses:
      - matrices/gamp5_gxp_gap_analysis.yml  # optional GxP/CSV overlay for this profile
      - matrices/iso_27001_gap_analysis.yml
      - matrices/gdpr_gap_analysis.yml
      - matrices/swiss_nfadp_gap_analysis.yml
      - matrices/privacy_data_protection_gap_index.yml
    record_families:
      - records/validation
      - records/verification_validation
      - records/configuration
      - records/isms
      - records/privacy
    qms_intent_standards:
      - "ISO 9001:2015 (incl. Amd 1:2024)"
      - "ISO/IEC 27001:2022 (incl. Amd 1:2024)"
      - "GDPR / Swiss nFADP"
    boundary: >-
      This profile reuses the baseline's computerized-system validation
      (SOP-006), lifecycle/release (SOP-020), and the V&V and configuration work
      instructions. It does NOT provide clinical-research-specific controls.
    escalation: []
    adopter_must_provide:
      - >-
        Good Clinical Practice (GCP) processes appropriate to the adopter's role
        (e.g. sponsor, CRO, site) — NOT covered by the baseline.
      - >-
        Computerized-system validation depth and data-integrity (ALCOA+)
        controls for the regulated-research context — beyond the baseline's
        QMS-tooling validation.
      - >-
        Electronic records / electronic signatures mapping to the applicable
        framework (e.g. 21 CFR Part 11, EU Annex 11) — NOT asserted by the baseline.
      - Sponsor / CRO / site interface obligations and trial-master-file linkage.
