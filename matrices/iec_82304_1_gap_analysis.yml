version: 2
analysis_date: "2026-04-25"
standard:
  exact_name: "IEC 82304-1:2016 Health software - Part 1: General requirements for product safety"
  normative_base: "IEC 82304-1:2016"
analysis_scope: "ACME GmbH QMS-Lite governance, product dossier templates, lifecycle controls, and GitHub-native release controls"
summary:
  covered_clause_groups:
    - "4"
    - "5"
    - "6"
    - "7"
    - "8"
  product_specific_or_tailored:
    - clause: "4 health software product requirements"
      rationale: "Intended use, use requirements, system requirements, and requirement verification are defined per product in the medical device file and design records."
    - clause: "6 health software product validation"
      rationale: "Validation planning, execution, and reporting are performed in designated product repositories using controlled V&V templates and GitHub-native approval evidence."
    - clause: "7 identification and accompanying documents"
      rationale: "Product identification and release-baseline records are produced through the controlled lifecycle. Accompanying information (IFU, user-facing labeling, and technical description) is a primary controlled artifact maintained per product through SOP-007 minimum MDF content and the dedicated accompanying-information template."
    - clause: "8 post-market activities including retirement"
      rationale: "Post-market signal handling is performed through complaint, incident, PMS, and nonconformity controls. Product retirement and decommissioning is an explicit lifecycle control under SOP-020 covering retirement decision, user/customer impact, communication, residual-risk handling, and record retention."
  outstanding_gaps: []
