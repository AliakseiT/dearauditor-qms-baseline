  "5": ["SOP-020", "SOP-008", "WI-001", "WI-002"]
  "6": ["SOP-008", "SOP-020", "WI-001"]
  "7": ["SOP-007", "SOP-020", "WI-002", "records/mdf/accompanying_information_template.md", "records/mdf/declaration_of_conformity_template.md", "records/mdf/medical_device_file_index_template.md"]
  "8": ["SOP-012", "SOP-013", "SOP-014", "SOP-015", "SOP-020", "records/mdf/medical_device_file_index_template.md"]
