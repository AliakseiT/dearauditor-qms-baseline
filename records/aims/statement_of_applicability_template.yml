version: 1
record_type: statement_of_applicability
soa_id: "AIMS-SOA-<yyyy-mm-dd>"
standard: "ISO/IEC 42001:2023 Annex A"
scope_reference: "records/aims/aims_register.yml"
approval:
  meaning_of_signature: "Approved Statement of Applicability"
  signer_roles:
    - "management_representative"
    - "qa_lead"
completion_rules:
  required_control_set: "All ISO/IEC 42001:2023 Annex A controls"
  approval_condition: "Approval is permitted only after every Annex A control has one assessed row with applicability, rationale, implementation status, owner, evidence or treatment reference, and last review date."
  allowed_applicability_values:
    - "applicable"
    - "not_applicable"
  allowed_implementation_status_values:
    - "implemented"
    - "partially_implemented"
    - "planned"
    - "not_implemented"
    - "risk_accepted"
    - "not_applicable"
  completion_checks:
    all_annex_a_controls_accounted_for: false
    applicable_controls_have_owner_and_evidence_or_treatment: false
    not_applicable_controls_have_justification: false
    risk_accepted_or_exception_controls_have_approval_reference: false
    summary_counts_reconciled_to_control_rows: false
summary:
  annex_a_control_set_complete: false
  total_controls_assessed: 0
  unassessed_controls: "count remaining Annex A controls before approval"
  applicable_controls: 0
  not_applicable_controls: 0
  implemented_controls: 0
  partially_implemented_controls: 0
  risk_accepted_controls: 0
  controls_requiring_treatment_or_exception: 0
controls:
  - control_id: "A.example.policies_for_ai"
    control_family: "policies_for_ai"
    control_name: "Example AI policy control"
    applicability: "applicable|not_applicable"
    applicability_rationale: "Applies because ACME products contain AI components governed by this AIMS."
    implementation_status: "implemented|partially_implemented|planned|not_implemented|risk_accepted|not_applicable"
    implementation_owner_role: "qa_lead"
    implementation_summary: "Implemented through SOP-022 and the AIMS register. Policy ownership is approved at management review."
    evidence_references:
      - "sops/SOP-022-AIManagementSystem.md"
      - "sops/SOP-005-QMSGovernance.md"
      - "records/aims/aims_register.yml"
    linked_risks:
      - "AIMS-RISK-001"
    treatment_or_exception_reference: ""
    last_reviewed_on: "YYYY-MM-DD"
    notes: "Replace example rows with one assessed row for each Annex A control before approval."
  - control_id: "A.example.ai_system_lifecycle"
    control_family: "ai_system_lifecycle"
    control_name: "Example AI lifecycle control"
    applicability: "applicable"
    applicability_rationale: "Applies to AI components built or integrated into ACME medical-device software."
    implementation_status: "partially_implemented"
    implementation_owner_role: "engineering_lead"
    implementation_summary: "Core lifecycle controls operate through SOP-008 and SOP-020 with AI-specific outputs. Product-specific monitoring evidence is completed in each product repository."
    evidence_references:
      - "sops/SOP-008-DesignAndDevelopmentControl.md"
      - "sops/SOP-020-SoftwareLifecycleConfigurationAndReleaseManagement.md"
      - "records/aims/aims_register.yml"
    linked_risks:
      - "AIMS-RISK-001"
    treatment_or_exception_reference: "AIMS-EXC-001 or change/CAPA reference"
    last_reviewed_on: "YYYY-MM-DD"
    notes: "Replace example rows with the complete Annex A control set and retain only justified non-applicable controls."
review_history:
  - review_date: "YYYY-MM-DD"
    reviewer_roles:
      - "management_representative"
      - "qa_lead"
    change_summary: "Initial SoA baseline."
    approval_reference: ""
