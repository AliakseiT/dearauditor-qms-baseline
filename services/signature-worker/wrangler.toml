name = "signature-worker"
main = "src/index.ts"
compatibility_date = "2026-03-02"
workers_dev = true

[[kv_namespaces]]
binding = "PIN_KV"
id = "REPLACE_WITH_PIN_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PIN_KV_PREVIEW_NAMESPACE_ID"

[vars]
PUBLIC_BASE_URL = "REPLACE_WITH_SIGNING_BASE_URL"
DEFAULT_OAUTH_PROVIDER = "github"
ALLOWED_OAUTH_PROVIDERS = "github"
REPO_ALIASES_JSON = "{\"AliakseiT/qms-lite\":\"AliakseiT/dearauditor-qms-baseline\"}"
