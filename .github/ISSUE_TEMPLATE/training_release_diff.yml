name: Training Release Diff (Consolidated)
description: Record one user-level training delta covering all SOP revision gaps introduced by a release.
title: "TRAINING DIFF REQUIRED: [GITHUB-LOGIN] consolidated ([RELEASE-TAG])"
labels:
  - training
  - training-diff
body:
  - type: input
    id: release_tag
    attributes:
      label: Trigger Release Tag
      description: Release that introduced new required SOP revisions.
      placeholder: qms-baseline-2026.03.05-r01
    validations:
      required: true

  - type: input
    id: trainee_login
    attributes:
      label: Trainee GitHub Login
      description: GitHub login for the training user.
      placeholder: AliakseiT
    validations:
      required: true

  - type: textarea
    id: sop_delta_table
    attributes:
      label: SOP Deltas In Scope
      description: One row per SOP requiring training.
      placeholder: |
        | SOP ID | From Revision | To Revision | SOP File |
        |---|---|---|---|
        | SOP-001 | R01 | R02 | sops/SOP-001-DocControl.md |
    validations:
      required: true

  - type: textarea
    id: completion_notes
    attributes:
      label: Completion Notes
      description: Link PR and attestation evidence after training completion.
      placeholder: PR #__, approval link, signature attestation comment link
