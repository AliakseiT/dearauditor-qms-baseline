name: Release Plan
description: Approve release readiness, freeze included changes, and later publish the release baseline.
title: "RELEASE PLAN: "
labels:
  - release-management
  - plan
body:
  - type: input
    id: product_id
    attributes:
      label: Product ID
      description: Product or subsystem identifier.
      placeholder: ACME-GENERIC-SAMD
    validations:
      required: true
  - type: input
    id: target_version
    attributes:
      label: Target Version or Tag
      description: Planned release version, tag, or baseline name.
      placeholder: v1.2.0 or rel-2026-03-06-r01
    validations:
      required: true
  - type: textarea
    id: configuration_items
    attributes:
      label: Configuration Items
      description: Repositories, components, commits, or packages that define the release candidate and later release baseline.
      placeholder: |
        - app repo @ <sha>
        - configuration manifest
        - deployment package reference
    validations:
      required: true
  - type: textarea
    id: included_changes
    attributes:
      label: Included Changes
      description: Change records or PRs approved to enter formal release-candidate V&V.
      placeholder: |
        - CHANGE-...
        - PR-...
    validations:
      required: true
  - type: textarea
    id: deferred_changes
    attributes:
      label: Deferred Changes
      description: Merged or in-flight changes that are explicitly excluded from this release candidate.
      placeholder: |
        - CHANGE-...
        - PR-...
  - type: input
    id: candidate_binary
    attributes:
      label: Release Candidate Binary / Deployment
      description: Exact package, container image, build artifact, or deployment identifier entering formal V&V.
      placeholder: ghcr.io/org/app@sha256:... or build-2026-03-07.1
    validations:
      required: true
  - type: textarea
    id: linked_records
    attributes:
      label: Linked Records
      description: Design-input baseline, V&V, risk, change, anomaly, or approval records required for release readiness and later final release decision.
      placeholder: |
        - design input baseline
        - VVR-...
        - RISK-...
        - CHANGE-...
    validations:
      required: true
  - type: textarea
    id: rollback_note
    attributes:
      label: Rollback or Containment Note
      description: High-level rollback or containment approach if release must be halted.
      placeholder: Document the fallback baseline or containment plan.
    validations:
      required: true
  - type: textarea
    id: done_criteria
    attributes:
      label: Done Criteria
      description: What must be true before the release plan can close.
      placeholder: |
        - Release readiness PR merged and signed before formal V&V
        - Included/deferred change set frozen for the candidate
        - Formal V&V executed against the recorded candidate binary
        - Final release decision PR merged and signed
        - Immutable release published
        - MDF and traceability links updated
    validations:
      required: true
