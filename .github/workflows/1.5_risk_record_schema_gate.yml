name: 1.5 Risk Record Schema Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    paths:
      - records/risk/*.yml

permissions:
  contents: read

jobs:
  validate_risk_records:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate risk register structure
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 -m pip install --quiet pyyaml
          python3 <<'PY'
          import os
          import subprocess
          import sys
          from pathlib import Path

          import yaml

          allowed_source_types = {
            "hazard_top_down",
            "failure_mode_bottom_up",
            "cybersecurity_threat",
          }

          base_sha = os.environ["BASE_SHA"].strip()
          head_sha = os.environ["HEAD_SHA"].strip()

          changed = subprocess.check_output(
            ["git", "diff", "--name-only", base_sha, head_sha, "--", "records/risk/*.yml"],
            text=True,
          ).splitlines()
          changed = [c.strip() for c in changed if c.strip()]

          if not changed:
            print("No risk yaml changes; gate passed.")
            sys.exit(0)

          errors = []

          def expect(entry, key, path):
            if key not in entry:
              errors.append(f"{path}: missing '{key}'")
              return None
            return entry.get(key)

          for file_path in changed:
            path = Path(file_path)
            if not path.exists():
              continue

            doc = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
            record_type = str(doc.get("record_type", "")).strip()

            if record_type != "risk_register":
              continue

            for root_key in ["version", "product_id", "assessment_scope", "scoring_model", "entries"]:
              if root_key not in doc:
                errors.append(f"{file_path}: missing root key '{root_key}'")

            entries = doc.get("entries", []) or []
            if not isinstance(entries, list) or len(entries) == 0:
              errors.append(f"{file_path}: entries must be a non-empty list")
              continue

            for idx, entry in enumerate(entries, start=1):
              p = f"{file_path} entry[{idx}]"
              for key in [
                "risk_id",
                "source_type",
                "hazard_or_threat",
                "hazardous_situation",
                "possible_harm",
                "initial_risk",
                "controls",
                "residual_risk",
                "status",
              ]:
                expect(entry, key, p)

              st = str(entry.get("source_type", "")).strip()
              if st and st not in allowed_source_types:
                errors.append(f"{p}: invalid source_type '{st}'")

              for risk_key in ["initial_risk", "residual_risk"]:
                rv = entry.get(risk_key, {}) or {}
                for k in ["severity", "probability", "score"]:
                  if k not in rv:
                    errors.append(f"{p}: {risk_key} missing '{k}'")
                try:
                  sev = int(rv.get("severity"))
                  prob = int(rv.get("probability"))
                  score = int(rv.get("score"))
                  if score != sev * prob:
                    errors.append(f"{p}: {risk_key}.score ({score}) != severity*probability ({sev*prob})")
                except Exception:
                  errors.append(f"{p}: {risk_key} severity/probability/score must be integers")

              controls = entry.get("controls", []) or []
              if not isinstance(controls, list) or len(controls) == 0:
                errors.append(f"{p}: controls must be a non-empty list")

          if errors:
            print("ERROR: Risk record schema validation failed:")
            for err in errors:
              print(f" - {err}")
            sys.exit(1)

          print("Risk record schema gate passed.")
          PY
