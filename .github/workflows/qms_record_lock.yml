name: QMS Record Lock

on:
  pull_request:
    types:
      - closed
    paths:
      - records/**/*.md

permissions:
  contents: read

jobs:
  lock_records:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect modified records
        id: records
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          if [ -z "$MERGE_SHA" ]; then
            MERGE_SHA="${{ github.sha }}"
          fi

          git diff --name-only "$BASE_SHA" "$MERGE_SHA" -- records/*.md records/*/*.md | sort -u > changed_records.txt
          if [ -s changed_records.txt ]; then
            echo "has_records=true" >> "$GITHUB_OUTPUT"
            cat changed_records.txt
          else
            echo "has_records=false" >> "$GITHUB_OUTPUT"
            echo "No markdown records changed in this merged PR."
          fi

      - name: Setup Python
        if: steps.records.outputs.has_records == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Render markdown records to PDF
        if: steps.records.outputs.has_records == 'true'
        shell: bash
        run: |
          python -m pip install --quiet markdown fpdf2
          python <<'PY'
          from datetime import datetime, timezone
          import hashlib
          import json
          from pathlib import Path
          import re

          import markdown as md
          from fpdf import FPDF

          out_dir = Path("worm-bucket-mock")
          out_dir.mkdir(parents=True, exist_ok=True)

          changed = [line.strip() for line in Path("changed_records.txt").read_text().splitlines() if line.strip()]
          manifest = []

          for src in changed:
            source_path = Path(src)
            if not source_path.exists():
              continue

            source_text = source_path.read_text(encoding="utf-8")
            html = md.markdown(source_text)
            plain = re.sub(r"<[^>]+>", "", html)
            lines = plain.splitlines() or [""]

            pdf = FPDF()
            pdf.set_auto_page_break(auto=True, margin=15)
            pdf.add_page()
            pdf.set_font("Helvetica", size=11)
            for raw_line in lines:
              line = raw_line.replace("\t", "    ")
              # Keep cursor anchored to left margin to avoid zero-width rendering edge cases.
              pdf.multi_cell(0, 6, line if line else " ", new_x="LMARGIN", new_y="NEXT")

            out_file = out_dir / f"{source_path.stem}.pdf"
            pdf.output(str(out_file))

            digest = hashlib.sha256(out_file.read_bytes()).hexdigest()
            manifest.append({
              "source_markdown": src,
              "locked_pdf": str(out_file),
              "sha256": digest,
              "locked_at_utc": datetime.now(timezone.utc).isoformat(),
            })

          (out_dir / "lock_manifest.json").write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          PY

      - name: Upload immutable WORM bucket mock
        if: steps.records.outputs.has_records == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: worm-bucket-mock-${{ github.run_id }}
          path: worm-bucket-mock/
          if-no-files-found: error
          retention-days: 5
