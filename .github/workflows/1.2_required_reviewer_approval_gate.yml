name: 1.2 Required Reviewer Approval Gate
run-name: 1.2 Reviewer Approval Gate

# Runs on `pull_request_target` so the workflow definition is read from
# the base branch (trusted), not the PR branch. Once the `main` ruleset
# requires the `qms_approval_gate` commit status this workflow
# publishes, a PR author with `pull_request:` could modify this
# workflow in their PR to publish `success` unconditionally and bypass
# the reviewer-approval gate. `pull_request_target` keeps the workflow
# definition under the maintainers' control. The only repository content
# this gate loads is the shared signer-role matcher at
# `.github/scripts/role-coverage.js`, checked out from the trusted base
# ref (`persist-credentials: false`); all PR state is read via the API.
# Mirrors the commit-status gate shipped in adalyon-qms PR #25.
on:
  pull_request_target:
    types: [opened, edited, reopened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: read
  issues: read
  statuses: write

jobs:
  publish_approval_status:
    if: github.event.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base ref (trusted) for the shared role matcher
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - name: Publish reviewer approval commit status
        uses: actions/github-script@v8
        with:
          script: |
            const STATUS_CONTEXT = 'qms_approval_gate';
            // Trusted base-ref module (checked out above). Single source of
            // truth for signer-role coverage, shared with 2.1; unit-tested in
            // .github/scripts/role-coverage.test.js.
            //
            // Bootstrap window: on `pull_request_review` the workflow BODY runs
            // from the PR head, but the body still checks out only the trusted
            // BASE ref (default branch) for this module. On the very PR that
            // INTRODUCES role-coverage.js, the base ref doesn't have it yet, so
            // the require throws. We must never execute the PR-head copy (that's
            // the injection vector the base-ref checkout exists to prevent), so
            // we exit WITHOUT publishing and let the pre-existing default-branch
            // 1.2 gate (the only one that can run for this one PR) govern it.
            // The new matcher self-governs every PR after this one merges. This
            // path is unreachable once the module is on the default branch — a
            // PR-head deletion can't trigger it because we only ever load from
            // base — so it engages solely during the legitimate bootstrap.
            let matchRoleSlots;
            try {
              ({ matchRoleSlots } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/role-coverage.js`));
            } catch (loadErr) {
              core.warning(`Signer-role matcher not present on the base ref yet (bootstrap for the PR that introduces .github/scripts/role-coverage.js): ${loadErr && loadErr.message ? loadErr.message : loadErr}. Deferring to the default-branch gate for this PR; the matcher self-governs every PR after it merges.`);
              return;
            }
            const parseRoleCoverageData = (body) => {
              const m = String(body || '').match(/<!-- role-coverage-data:\s*(\{[\s\S]*?\})\s*-->/);
              if (!m) return null;
              try {
                const d = JSON.parse(m[1]);
                if (!Array.isArray(d.sequence) || typeof d.members !== 'object' || d.members === null) return null;
                return { sequence: d.sequence, members: d.members };
              } catch (_e) {
                return null;
              }
            };
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull request context; skipping.');
              return;
            }

            let headSha = String(pr.head?.sha || '').toLowerCase();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const statusDescription = (description) => String(description || '').slice(0, 140);
            const publishStatus = async (state, description) => {
              if (!headSha) {
                throw new Error(`Cannot publish ${STATUS_CONTEXT}; PR head SHA is empty.`);
              }
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: headSha,
                state,
                context: STATUS_CONTEXT,
                description: statusDescription(description),
                target_url: runUrl,
              });
              core.info(`Published ${STATUS_CONTEXT}=${state} for ${headSha}: ${description}`);
            };

            try {
              const fresh = (await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              })).data;

              if (fresh.state !== 'open') {
                core.info(`PR #${pr.number} is ${fresh.state}; approval status skipped.`);
                return;
              }

              headSha = String(fresh.head?.sha || '').toLowerCase();
              if (!headSha) {
                throw new Error(`Could not resolve PR #${pr.number} head SHA.`);
              }

              if (fresh.draft) {
                await publishStatus('pending', 'Draft PR; reviewer approval gate deferred.');
                return;
              }

              const labels = (fresh.labels || []).map((l) => String(l.name || '').toLowerCase());
              if (labels.includes('review-only')) {
                await publishStatus('success', 'Review-only label bypasses reviewer approval gate.');
                return;
              }

              const body = fresh.body || '';
              const sigMatch = body.match(/\*\*Required Signatures:\*\*\s*([^\n]+)/i);
              let requiredSignatures = sigMatch ? Number.parseInt(sigMatch[1].trim(), 10) : 1;
              if (!Number.isInteger(requiredSignatures) || requiredSignatures < 1) {
                requiredSignatures = 1;
              }
              const baseRequiredReviewerApprovals = Math.max(0, requiredSignatures - 1);

              const author = String(fresh.user?.login || '').toLowerCase();
              if (!author) {
                await publishStatus('failure', 'Could not resolve PR author for reviewer approval gate.');
                return;
              }

              const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              const paths = changedFiles.map((f) => String(f.filename || ''));
              const requiresEvidenceChecklist = paths.some((path) => path.startsWith('records/verification_validation/runs/')) ||
                /^##\s+Evidence Review Package\b/mi.test(body);
              const evidenceChecklistStatus = (commentBody) => {
                const lines = String(commentBody || '').split(/\r?\n/);
                const start = lines.findIndex((line) => /^##\s+Evidence Review Checklist\b/i.test(line));
                if (start < 0) return { present: false, complete: true, total: 0, open: [] };
                const next = lines.findIndex((line, index) => index > start && /^##\s+\S/.test(line));
                const section = lines.slice(start + 1, next < 0 ? undefined : next).join('\n');
                const items = Array.from(section.matchAll(/^\s*-\s*\[( |x|X)\]\s+(.+)$/gm));
                const open = items
                  .filter((item) => item[1] === ' ')
                  .map((item) => String(item[2] || '').trim())
                  .filter(Boolean);
                return {
                  present: true,
                  complete: items.length > 0 && open.length === 0,
                  total: items.length,
                  open,
                };
              };
              const checklist = evidenceChecklistStatus(body);
              if (requiresEvidenceChecklist && !checklist.present) {
                core.info(`PR #${pr.number} is an evidence-package PR but has no "## Evidence Review Checklist" section.`);
                await publishStatus('failure', 'Evidence-package PR is missing the Evidence Review Checklist section.');
                return;
              }
              if (checklist.present && !checklist.complete) {
                if (checklist.total === 0) {
                  core.info(`PR #${pr.number} has an Evidence Review Checklist section but no checkable items.`);
                  await publishStatus('failure', 'Evidence Review Checklist has no checkable items.');
                  return;
                }
                core.info(`Evidence Review Checklist incomplete; unchecked items: ${checklist.open.join('; ')}`);
                await publishStatus('failure', `Evidence Review Checklist incomplete: ${checklist.open.length} unchecked item(s).`);
                return;
              }

              const marker = '<!-- signature-auto-reviewers -->';
              const legacyMarker = '<!-- part11-auto-reviewers -->';
              const automationBotLogins = new Set(['dearauditor-open-qms-bot', 'dearauditor-open-qms-bot[bot]', 'dearauditor-qms-baseline-bot', 'dearauditor-qms-baseline-sign', 'github-actions[bot]']);
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              });
              const markerComments = comments
                .filter((c) => ((c.body || '').includes(marker) || (c.body || '').includes(legacyMarker)) && automationBotLogins.has(String(c.user?.login || '').toLowerCase()))
                .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
              const latestMarkerBody = markerComments.length > 0 ? String(markerComments[markerComments.length - 1].body || '') : '';
              const parseAssignedReviewers = (commentBody) => {
                const lineMatch = String(commentBody || '').match(/Assigned reviewers:\s*([^\n]+)/i);
                return lineMatch
                  ? Array.from((lineMatch[1] || '').matchAll(/@([A-Za-z0-9-]+)/g)).map((m) => m[1].toLowerCase())
                  : [];
              };
              const parseBooleanLine = (commentBody, label) => {
                const match = String(commentBody || '').match(new RegExp(`${label}:\\s*\`?(yes|no)\`?`, 'i'));
                return match ? match[1].toLowerCase() === 'yes' : null;
              };
              const parseIntegerLine = (commentBody, label) => {
                const match = String(commentBody || '').match(new RegExp(`${label}:\\s*\`?(\\d+)\`?`, 'i'));
                return match ? Number.parseInt(match[1], 10) : null;
              };

              const requestedReviewers = (fresh.requested_reviewers || []).map((reviewer) => String(reviewer.login || '').toLowerCase()).filter(Boolean);
              let requiredReviewerApprovals = null;
              let reviewerPool = [];
              let policySource = '';
              let coapprovalReasons = [];

              if (latestMarkerBody) {
                const explicitApprovalRequired = parseBooleanLine(latestMarkerBody, 'Reviewer approval required for merge');
                const explicitRequiredApprovals = parseIntegerLine(latestMarkerBody, 'Required reviewer approvals for merge');
                if (explicitApprovalRequired !== null || explicitRequiredApprovals !== null) {
                  requiredReviewerApprovals = explicitApprovalRequired === false
                    ? 0
                    : explicitRequiredApprovals ?? Math.max(1, baseRequiredReviewerApprovals);
                  reviewerPool = Array.from(new Set([
                    ...parseAssignedReviewers(latestMarkerBody),
                    ...requestedReviewers,
                  ]));
                  policySource = 'assignment comment';
                }
              }

              if (requiredReviewerApprovals === null) {
                const hasPath = (prefix) => paths.some((p) => p.startsWith(prefix));
                if (hasPath('qm/') || hasPath('sops/')) coapprovalReasons.push('controlled documents (/qm, /sops)');
                if (hasPath('records/')) coapprovalReasons.push('records (/records, including templates and index pages)');
                if (paths.some((path) => path.startsWith('records/management-reviews/'))) coapprovalReasons.push('management review records (/records/management-reviews)');
                if (hasPath('matrices/')) coapprovalReasons.push('matrix/role files (/matrices)');
                const policyMinimumApprovals = coapprovalReasons.length > 0 ? 1 : 0;
                requiredReviewerApprovals = Math.max(baseRequiredReviewerApprovals, policyMinimumApprovals);
                reviewerPool = [];
                policySource = 'path fallback';
              }

              if (requiredReviewerApprovals === 0) {
                await publishStatus('success', `No reviewer approval required for merge (${policySource}).`);
                return;
              }

              if (reviewerPool.length === 0 && policySource === 'assignment comment') {
                await publishStatus('failure', 'Reviewer approval required, but assigned reviewer pool is empty.');
                return;
              }

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });

              const latestByUser = new Map();
              for (const review of reviews) {
                const login = String(review.user?.login || '').trim().toLowerCase();
                if (!login) continue;
                const submittedAt = Date.parse(review.submitted_at || review.submittedAt || review.updated_at || review.created_at || 0) || 0;
                const current = latestByUser.get(login);
                if (!current || submittedAt >= current.submittedAt) {
                  latestByUser.set(login, {
                    state: String(review.state || '').toUpperCase(),
                    commitId: String(review.commit_id || '').toLowerCase(),
                    submittedAt,
                  });
                }
              }

              const approvedNonAuthorOnHead = Array.from(latestByUser.entries())
                .filter(([login, review]) => {
                  if (login === author) return false;
                  if (review.state !== 'APPROVED') return false;
                  return review.commitId === headSha;
                })
                .map(([login]) => login);

              // Primary path: order-independent signer-role coverage. The role
              // map (declared slots + per-role qualifying members) is the
              // trusted base-ref resolver output embedded by 1.1. The author
              // covers at most one declared role — whichever the reviewers did
              // NOT — and every other role needs a distinct qualifying
              // non-author approval on the current head. This replaces the bare
              // non-author count, which could pass with a declared role left
              // unfilled (e.g. an engineer's approval satisfying the count while
              // no one covered QA).
              const roleCoverage = parseRoleCoverageData(latestMarkerBody);
              if (roleCoverage && roleCoverage.sequence.length > 0) {
                const cov = matchRoleSlots(
                  roleCoverage.sequence,
                  roleCoverage.members,
                  author,
                  approvedNonAuthorOnHead,
                  requiredReviewerApprovals,
                );
                if (!cov.covered) {
                  const have = approvedNonAuthorOnHead.map((x) => '@' + x).join(', ') || 'none';
                  await publishStatus('pending', `Unmet signer role(s): ${cov.missingRoleIds.join(', ')} — needs a non-author approval from a qualifying signer (non-author approvals on head: ${have}).`);
                  return;
                }
                const approverList = approvedNonAuthorOnHead.map((x) => '@' + x).join(', ');
                await publishStatus('success', `Signer roles covered on current head${approverList ? ` (non-author approvals: ${approverList})` : ''}.`);
                return;
              }

              // No (or invalid) role-coverage data on the bot marker: fail
              // CLOSED. Never approve on a bare non-author count — that would
              // re-open the signer-role gap (a wrong-role approval satisfying
              // merge while a declared signer role stays uncovered, leaving 2.1
              // to fail post-merge). A marker without the role map predates
              // role-coverage emission; re-running 1.1 (push any commit, or
              // edit the PR) regenerates it. We deliberately do NOT recompute
              // the role map here — that would require the Python resolver in
              // this gate; the trusted base-ref resolver runs in 1.1.
              await publishStatus(
                'pending',
                'Signer-role coverage data missing from the reviewer-assignment marker — re-run 1.1 (push a commit or edit the PR) to regenerate it. This gate does not approve on a bare approval count.',
              );
              return;
            } catch (err) {
              const message = err && err.message ? err.message : String(err);
              if (headSha) {
                try {
                  await publishStatus('error', `Approval gate automation error: ${message}`);
                } catch (statusErr) {
                  core.warning(`Could not publish ${STATUS_CONTEXT}=error: ${statusErr.message}`);
                }
              }
              core.setFailed(`Approval status gate failed unexpectedly: ${message}`);
            }
