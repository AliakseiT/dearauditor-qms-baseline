name: 2.1 PR Signature Request Gate
run-name: 2.1 post-merge signature request (PR #${{ github.event.pull_request.number || inputs.pr_number }})

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Merged pull request number to recover signature request comment for"
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: signature-post-merge-pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  request_native_signatures:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Parse merged PR signature requirements
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            const inputPrNumber = Number.parseInt((process.env.WORKFLOW_INPUT_PR_NUMBER || '').trim(), 10);
            const eventPr = context.payload.pull_request;
            const prNumber = Number.isInteger(inputPrNumber) && inputPrNumber > 0
              ? inputPrNumber
              : eventPr?.number;
            if (!Number.isInteger(prNumber) || prNumber < 1) {
              core.setFailed('A valid merged PR number is required.');
              return;
            }
            const pr = (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            })).data;
            if (!pr.merged) {
              core.setFailed(`PR #${prNumber} must be merged before a signature request can be posted.`);
              return;
            }
            const body = pr.body || '';

            const meaningMatch = body.match(/\*\*Meaning of Signature:\*\*\s*([^\n]+)/i);
            let meaning = meaningMatch ? meaningMatch[1].trim() : '';
            if (!meaning || meaning.startsWith('[')) {
              meaning = 'Approved Quality Record';
            }

            const rolesMatch = body.match(/\*\*Signer Roles:\*\*\s*([^\n]+)/i);
            let roles = rolesMatch ? rolesMatch[1].trim() : '';
            if (!roles || roles.startsWith('[')) {
              roles = 'Quality Assurance Lead';
            }

            const sigMatch = body.match(/\*\*Required Signatures:\*\*\s*([^\n]+)/i);
            let required = sigMatch ? Number.parseInt(sigMatch[1].trim(), 10) : 1;
            if (!Number.isInteger(required) || required < 1) {
              required = 1;
            }
            const baseRequiredReviewerSignatures = Math.max(0, required - 1);

            const targetCommit = pr.merge_commit_sha || pr.head?.sha;
            const repoFull = `${context.repo.owner}/${context.repo.repo}`;
            const targetHash = crypto.createHash('sha256').update(`${repoFull}:${targetCommit}`).digest('hex');
            const authorLogin = (pr.user?.login || '').toLowerCase();
            if (!authorLogin) {
              core.setFailed(`PR #${prNumber} author could not be resolved for Part 11 signer list.`);
              return;
            }
            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });
            const paths = changedFiles.map((f) => String(f.filename || ''));
            const hasPath = (prefix) => paths.some((p) => p.startsWith(prefix));
            const isRecordArtifactPath = (path) => path.startsWith('records/') && /\.(md|ya?ml|json)$/i.test(path);
            const isTemplateRecordPath = (path) => /(^|[_-])template\.(md|ya?ml|json)$/i.test(path.split('/').pop() || '');
            const isRecordIndexPath = (path) => path.startsWith('records/') && /(^|\/)README\.md$/i.test(path);
            const isExecutionRecordPath = (path) =>
              isRecordArtifactPath(path) &&
              !isTemplateRecordPath(path) &&
              !isRecordIndexPath(path);
            const coapprovalReasons = [];
            if (hasPath('sops/')) coapprovalReasons.push('SOP files (/sops)');
            if (paths.some((path) => isExecutionRecordPath(path))) coapprovalReasons.push('execution records (/records, excluding templates and index pages)');
            if (paths.some((path) => isExecutionRecordPath(path) && path.startsWith('records/management-reviews/'))) coapprovalReasons.push('management review records (/records/management-reviews)');
            if (hasPath('matrices/')) coapprovalReasons.push('matrix/role files (/matrices)');
            const policyMinimumReviewerSignatures = coapprovalReasons.length > 0 ? 1 : 0;
            const requiredReviewerSignatures = Math.max(baseRequiredReviewerSignatures, policyMinimumReviewerSignatures);
            const requiredSignaturesForRequest = Math.max(required, requiredReviewerSignatures + 1);
            const requestedReviewers = (pr.requested_reviewers || [])
              .map((r) => (r.login || '').toLowerCase())
              .filter(Boolean);
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });
            const latestReviewByUser = new Map();
            for (const review of reviews) {
              const login = (review.user?.login || '').trim();
              if (!login) continue;
              latestReviewByUser.set(login.toLowerCase(), {
                state: String(review.state || '').toUpperCase(),
                commitId: String(review.commit_id || '').toLowerCase(),
              });
            }
            const currentHeadSha = String(pr.head?.sha || '').toLowerCase();
            const approvedOnHead = Array.from(latestReviewByUser.entries())
              .filter(([, review]) => review.state === 'APPROVED' && review.commitId === currentHeadSha)
              .map(([login]) => login);
            const approvedOnHeadSet = new Set(approvedOnHead);
            if (requiredReviewerSignatures > 0 && approvedOnHead.length === 0) {
              core.setFailed(
                `PR #${prNumber} requires reviewer signatures, but has no valid approval on current head commit ${currentHeadSha || '(unknown)'}. Signature request was not posted.`
              );
              return;
            }

            let reviewerPool = requestedReviewers;
            if (reviewerPool.length === 0) {
              const marker = '<!-- signature-auto-reviewers -->';
              const legacyMarker = '<!-- part11-auto-reviewers -->';
              const automationBotLogins = new Set(['qms-lite-bot', 'qms-lite-sign', 'github-actions[bot]']);
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              });
              const markerComments = comments
                .filter((c) => ((c.body || '').includes(marker) || (c.body || '').includes(legacyMarker)) && automationBotLogins.has(String(c.user?.login || '').toLowerCase()))
                .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
              if (markerComments.length > 0) {
                const latestBody = markerComments[markerComments.length - 1].body || '';
                const lineMatch = latestBody.match(/Assigned reviewers:\s*([^\n]+)/i);
                reviewerPool = lineMatch
                  ? Array.from((lineMatch[1] || '').matchAll(/@([A-Za-z0-9-]+)/g)).map((m) => m[1].toLowerCase())
                  : [];
              }
            }
            if (reviewerPool.length === 0) {
              reviewerPool = approvedOnHead;
            }
            if (reviewerPool.length < requiredReviewerSignatures) {
              core.setFailed(
                `PR #${prNumber} requires ${requiredReviewerSignatures} reviewer signature(s) (author auto-signs 1), but only ${reviewerPool.length} reviewer candidate(s) were resolved.${coapprovalReasons.length > 0 ? ` Co-approval scope matched: ${coapprovalReasons.join('; ')}` : ''}`
              );
              return;
            }

            const approvedFromPool = reviewerPool.filter((login) => approvedOnHeadSet.has(login.toLowerCase()));
            if (approvedFromPool.length < requiredReviewerSignatures) {
              core.setFailed(
                `PR #${prNumber} requires ${requiredReviewerSignatures} reviewer signature(s) (author auto-signs 1), but only ${approvedFromPool.length} reviewer candidate(s) approved.`
              );
              return;
            }
            const reviewerSigners = approvedFromPool.slice(0, requiredReviewerSignatures);
            const finalSigners = [authorLogin, ...reviewerSigners];

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('meaning_of_signature', meaning);
            core.setOutput('signatory_roles', roles);
            core.setOutput('required_signatures', String(requiredSignaturesForRequest));
            core.setOutput('required_reviewer_signatures', String(requiredReviewerSignatures));
            core.setOutput('target_hash', targetHash);
            core.setOutput('target_commit', targetCommit);
            core.setOutput('author_login', authorLogin);
            core.setOutput('approved_signers_csv', finalSigners.join(','));
            core.setOutput('coapproval_reasons', coapprovalReasons.join('; '));
        env:
          WORKFLOW_INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}

      - name: Create GitHub App token for signature comments
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.QMS_BOT_APP_ID }}
          private-key: ${{ secrets.QMS_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Post Git-native signature request on merged PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const prNumber = Number.parseInt(process.env.PR_NUMBER, 10);
            if (!Number.isInteger(prNumber) || prNumber < 1) {
              core.setFailed('Missing PR_NUMBER workflow output.');
              return;
            }
            const pr = (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            })).data;
            const signingBaseUrl = (process.env.SIGNATURE_UI_BASE_URL || '').trim().replace(/\/+$/g, '');
            if (!signingBaseUrl) {
              core.setFailed('Missing SIGNATURE_UI_BASE_URL variable. Configure repository variable SIGNATURE_UI_BASE_URL.');
              return;
            }
            const roles = (process.env.ROLES || '')
              .split(/[;,]/)
              .map((x) => x.trim())
              .filter(Boolean);
            const approvedSigners = (process.env.APPROVED_SIGNERS_CSV || '')
              .split(',')
              .map((x) => x.trim())
              .filter(Boolean);
            const buildLink = (signer) => {
              const params = new URLSearchParams({
                repo: `${context.repo.owner}/${context.repo.repo}`,
                pr: String(pr.number),
                signer: signer.toLowerCase(),
              });
              return `${signingBaseUrl}/sign?${params.toString()}`;
            };
            const signerSlots = approvedSigners.map((u, i) => ({
              signer: u.toLowerCase(),
              role: roles[i] || roles[0] || 'Quality Assurance Lead',
              signature_index: String(i + 1),
            }));

            const runLinks = signerSlots.length > 0
              ? signerSlots.map((slot) => `- @${slot.signer} (${slot.role}): [Open signature ceremony](${buildLink(slot.signer)})`)
              : ['- No eligible approved assigned reviewers found.'];

            const coapprovalReasons = (process.env.COAPPROVAL_REASONS || '').trim();
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const requestComments = comments
              .filter((comment) => {
                const commentBody = String(comment.body || '');
                return commentBody.includes('<!-- signature-native-signature-request -->') ||
                  commentBody.includes('<!-- part11-native-signature-request -->');
              })
              .sort((a, b) => Date.parse(a.created_at || 0) - Date.parse(b.created_at || 0));
            const hasAttestation = comments.some((comment) => {
              const commentBody = String(comment.body || '');
              return commentBody.includes('<!-- signature-native-attestation -->') ||
                commentBody.includes('<!-- part11-native-attestation -->');
            });
            if (hasAttestation) {
              core.info(`PR #${prNumber} already has a native attestation comment; skipping request post.`);
              return;
            }
            const requestContext = {
              version: 1,
              hash: process.env.TARGET_HASH,
              meaning: process.env.MEANING,
              required_signatures: String(process.env.REQUIRED || '1'),
              signers: signerSlots,
            };
            const body = [
              '<!-- signature-native-signature-request -->',
              '<!-- SIGNATURE_REQUEST_CONTEXT_V1',
              JSON.stringify(requestContext, null, 2),
              '-->',
              '🛑 Signature required',
              '',
              `Meaning of signature: **${process.env.MEANING}**`,
              `Required signatures: **${process.env.REQUIRED}**`,
              `Designated signatory role(s): **${roles.join(', ') || process.env.ROLES}**`,
              `Eligible signers: **${approvedSigners.length > 0 ? approvedSigners.map((x) => '@' + x).join(', ') : 'none found'}**`,
              `Target hash (merge state): \`${process.env.TARGET_HASH}\``,
              coapprovalReasons ? `Co-approval scope matched: ${coapprovalReasons}` : '',
              '',
              'Use your assigned link. GitHub login must match the designated signer, then confirm with your QMS PIN.',
              '',
              ...runLinks,
            ].filter(Boolean).join('\n');

            const latestRequest = requestComments.length > 0 ? requestComments[requestComments.length - 1] : null;
            if (latestRequest) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: latestRequest.id,
                body,
              });
              core.info(`Updated signature request comment for PR #${prNumber}.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
        env:
          PR_NUMBER: ${{ steps.parse.outputs.pr_number }}
          MEANING: ${{ steps.parse.outputs.meaning_of_signature }}
          ROLES: ${{ steps.parse.outputs.signatory_roles }}
          REQUIRED: ${{ steps.parse.outputs.required_signatures }}
          TARGET_HASH: ${{ steps.parse.outputs.target_hash }}
          APPROVED_SIGNERS_CSV: ${{ steps.parse.outputs.approved_signers_csv }}
          COAPPROVAL_REASONS: ${{ steps.parse.outputs.coapproval_reasons }}
          SIGNATURE_UI_BASE_URL: ${{ vars.SIGNATURE_UI_BASE_URL }}
