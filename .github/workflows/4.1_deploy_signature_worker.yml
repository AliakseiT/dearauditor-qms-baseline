name: 4.1 Deploy Signature Worker
run-name: 4.1 Deploy Signature Worker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: services/signature-worker
        run: npm ci --no-fund --no-audit

      - name: Typecheck worker
        working-directory: services/signature-worker
        run: npm run typecheck

      - name: Show worker version
        working-directory: services/signature-worker
        run: npm run print-version

      - name: Materialize Wrangler config
        working-directory: services/signature-worker
        env:
          SIGNATURE_WORKER_NAME: ${{ vars.SIGNATURE_WORKER_NAME }}
          PIN_KV_NAMESPACE_ID: ${{ vars.PIN_KV_NAMESPACE_ID }}
          PIN_KV_PREVIEW_NAMESPACE_ID: ${{ vars.PIN_KV_PREVIEW_NAMESPACE_ID }}
          SIGNATURE_UI_BASE_URL: ${{ vars.SIGNATURE_UI_BASE_URL }}
          SIGNATURE_REPO_ALIASES_JSON: ${{ vars.SIGNATURE_REPO_ALIASES_JSON }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import re

          values = {
              "name": os.environ.get("SIGNATURE_WORKER_NAME", "").strip() or "signature-worker",
              "id": os.environ.get("PIN_KV_NAMESPACE_ID", "").strip(),
              "preview_id": os.environ.get("PIN_KV_PREVIEW_NAMESPACE_ID", "").strip(),
              "PUBLIC_BASE_URL": os.environ.get("SIGNATURE_UI_BASE_URL", "").strip(),
              "REPO_ALIASES_JSON": os.environ.get("SIGNATURE_REPO_ALIASES_JSON", "").strip() or "{\"AliakseiT/qms-lite\":\"AliakseiT/dearauditor-qms-baseline\"}",
          }

          required_keys = ("id", "preview_id", "PUBLIC_BASE_URL")
          missing = [key for key in required_keys if not values[key]]
          if missing:
              raise SystemExit(f"Missing required GitHub Actions variables for deploy: {', '.join(missing)}")

          path = Path("wrangler.toml")
          content = path.read_text(encoding="utf-8")
          for key, value in values.items():
              pattern = rf'(^\s*{re.escape(key)}\s*=\s*)".*?"(\s*$)'
              serialized = json.dumps(value)
              updated, count = re.subn(pattern, lambda match: f"{match.group(1)}{serialized}{match.group(2)}", content, count=1, flags=re.MULTILINE)
              if count != 1:
                  raise SystemExit(f"Could not update {key} in {path}")
              content = updated
          path.write_text(content, encoding="utf-8")
          PY

      - name: Deploy to Cloudflare Workers
        working-directory: services/signature-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
