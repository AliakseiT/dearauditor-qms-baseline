name: 1.6 Training PR Approval Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    paths:
      - records/training/**
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: write

jobs:
  enforce_trainee_approval:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enforce trainee-specific approval
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request payload; skipping.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const touchesTrainingLog = files.some((f) => String(f.filename || '').startsWith('records/training/'));
            if (!touchesTrainingLog) {
              core.info('PR does not modify records/training; gate skipped.');
              return;
            }

            const body = pr.body || '';
            const m = body.match(/\*\*Trainee GitHub Login:\*\*\s*@?([A-Za-z0-9-]+)/i);
            if (!m) {
              core.setFailed('Missing `**Trainee GitHub Login:** @<login>` in PR body for training-record update.');
              return;
            }
            const traineeLogin = m[1];

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: [traineeLogin],
              });
            } catch (error) {
              core.warning(`Could not request reviewer ${traineeLogin}: ${error.message}`);
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestStateByUser = new Map();
            for (const review of reviews) {
              const login = (review.user && review.user.login) ? review.user.login : '';
              if (!login) continue;
              latestStateByUser.set(login.toLowerCase(), (review.state || '').toUpperCase());
            }

            const traineeState = latestStateByUser.get(traineeLogin.toLowerCase()) || '';
            if (traineeState !== 'APPROVED') {
              core.setFailed(`Training PR requires approval from @${traineeLogin}. Current state: ${traineeState || 'none'}.`);
              return;
            }

            core.info(`Approval gate passed: @${traineeLogin} approved this training update PR.`);
