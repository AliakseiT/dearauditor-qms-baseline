name: Training Legacy Cleanup

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  close_legacy_per_sop_training_issues:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token for issue updates
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SIGNATURE_APP_ID }}
          private-key: ${{ secrets.SIGNATURE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Close legacy/non-QMS training issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const issue = context.payload.issue;
            const title = String(issue.title || '');
            const labels = (issue.labels || []).map((l) => String(l.name || '').toLowerCase());
            const isTraining = labels.includes('training-diff');
            const isLegacyPerSop = /^TRAINING DIFF REQUIRED:\s+.+\s+SOP-\d+\s+/i.test(title);
            const consolidatedMatch = title.match(/^TRAINING REQUIRED:\s+.+\s+\(([^)]+)\)\s*$/i);
            const releaseTagInTitle = consolidatedMatch ? String(consolidatedMatch[1] || '').trim() : '';
            const isQmsTrainingTag = /^QMS-\d{4}-\d{2}-\d{2}-R\d{2}$/i.test(releaseTagInTitle);
            const isNonQmsConsolidated = Boolean(releaseTagInTitle) && !isQmsTrainingTag;

            if (!isTraining || (!isLegacyPerSop && !isNonQmsConsolidated)) {
              core.info(`Issue #${issue.number} is not a legacy/non-QMS training issue.`);
              return;
            }

            const assignees = (issue.assignees || []).map((a) => String(a.login || '').trim()).filter(Boolean);
            if (assignees.length > 0) {
              await github.rest.issues.removeAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees,
              });
            }

            const reason = isLegacyPerSop
              ? 'legacy per-SOP training issue format is deprecated'
              : `training issue was triggered by non-QMS release tag \`${releaseTagInTitle}\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                '<!-- training-legacy-cleanup -->',
                `⛔ Closed automatically: ${reason}.`,
                'Use consolidated per-user training issues created only for `QMS-YYYY-MM-DD-RNN` releases.',
                'Assignees were removed before closing to avoid stale personal queues.',
              ].join('\n'),
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed',
            });
