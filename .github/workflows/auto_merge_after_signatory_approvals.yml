name: Auto Merge After Assigned Approvals

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto_merge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge when assigned reviewers approved
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull request context; skipping.');
              return;
            }
            if (pr.state !== 'open') {
              core.info(`PR #${pr.number} is not open; skipping.`);
              return;
            }

            const body = pr.body || '';
            const hasPart11Block = /\*\*Meaning of Signature:\*\*/i.test(body) || /Part 11 Signature Requirements/i.test(body);
            if (!hasPart11Block) {
              core.info(`PR #${pr.number} has no Part 11 signature block; auto-merge workflow skipped.`);
              return;
            }
            const sigMatch = body.match(/\*\*Required Signatures:\*\*\s*([^\n]+)/i);
            let requiredSignatures = sigMatch ? Number.parseInt(sigMatch[1].trim(), 10) : 1;
            if (!Number.isInteger(requiredSignatures) || requiredSignatures < 1) {
              requiredSignatures = 1;
            }
            const requiredReviewerApprovals = Math.max(0, requiredSignatures - 1);

            const fresh = (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            })).data;

            const requested = (fresh.requested_reviewers || []).map((r) => r.login).filter(Boolean);
            if (requested.length < requiredReviewerApprovals) {
              core.info(
                `PR #${pr.number} requires ${requiredReviewerApprovals} reviewer approval(s) (author auto-signs 1), but only ${requested.length} reviewer(s) are assigned.`
              );
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestStateByUser = new Map();
            for (const review of reviews) {
              const login = (review.user?.login || '').trim();
              if (!login) continue;
              latestStateByUser.set(login.toLowerCase(), String(review.state || '').toUpperCase());
            }

            const requiredReviewers = requested.slice(0, requiredReviewerApprovals);
            const pending = requiredReviewers.filter((login) => latestStateByUser.get(login.toLowerCase()) !== 'APPROVED');
            if (pending.length > 0) {
              core.info(`Waiting for approvals from: ${pending.map((x) => '@' + x).join(', ')}`);
              return;
            }

            if (fresh.auto_merge) {
              core.info(`Auto-merge already enabled for PR #${pr.number}.`);
              return;
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: MERGE}) {
                    pullRequest { number }
                  }
                }`,
                { pullRequestId: fresh.node_id }
              );
              core.info(`Enabled auto-merge for PR #${pr.number}.`);
            } catch (error) {
              core.warning(`Could not enable auto-merge via GraphQL: ${error.message}`);
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'merge',
                });
                core.info(`Merged PR #${pr.number} directly.`);
              } catch (mergeError) {
                core.warning(`Direct merge attempt failed for PR #${pr.number}: ${mergeError.message}`);
              }
            }
