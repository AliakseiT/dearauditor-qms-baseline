name: Auto Merge After Assigned Approvals

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto_merge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token for PR merge/comment
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SIGNATURE_APP_ID }}
          private-key: ${{ secrets.SIGNATURE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Enable auto-merge when assigned reviewers approved
        uses: actions/github-script@v7
        env:
          SIGNATURE_UI_BASE_URL: ${{ vars.SIGNATURE_UI_BASE_URL }}
          SIGNATURE_LINK_SECRET: ${{ secrets.SIGNATURE_LINK_SECRET }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const crypto = require('crypto');
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull request context; skipping.');
              return;
            }
            if (pr.state !== 'open') {
              core.info(`PR #${pr.number} is not open; skipping.`);
              return;
            }
            const labels = (pr.labels || []).map((l) => String(l.name || '').toLowerCase());
            if (labels.includes('review-only')) {
              core.info(`PR #${pr.number} is marked review-only; auto-merge skipped.`);
              return;
            }

            const body = pr.body || '';
            const sigMatch = body.match(/\*\*Required Signatures:\*\*\s*([^\n]+)/i);
            let requiredSignatures = sigMatch ? Number.parseInt(sigMatch[1].trim(), 10) : 1;
            if (!Number.isInteger(requiredSignatures) || requiredSignatures < 1) {
              requiredSignatures = 1;
            }
            const requiredReviewerApprovals = Math.max(1, requiredSignatures - 1);

            const fresh = (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            })).data;
            const headSha = (fresh.head?.sha || '').toLowerCase();

            const requested = (fresh.requested_reviewers || []).map((r) => r.login).filter(Boolean);

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestReviewByUser = new Map();
            for (const review of reviews) {
              const login = (review.user?.login || '').trim();
              if (!login) continue;
              latestReviewByUser.set(login.toLowerCase(), {
                state: String(review.state || '').toUpperCase(),
                commitId: String(review.commit_id || '').toLowerCase(),
              });
            }

            const approvedReviewers = Array.from(latestReviewByUser.entries())
              .filter(([, review]) => review.state === 'APPROVED')
              .map(([login]) => login);
            const approvedOnHead = Array.from(latestReviewByUser.entries())
              .filter(([, review]) => review.state === 'APPROVED' && review.commitId === headSha)
              .map(([login]) => login);
            const approvedOnHeadSet = new Set(approvedOnHead);

            let reviewerPool = requested.map((x) => String(x || '').toLowerCase()).filter(Boolean);
            if (reviewerPool.length === 0) {
              const marker = '<!-- part11-auto-reviewers -->';
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              });
              const markerComments = comments
                .filter((c) => (c.body || '').includes(marker) && (c.user?.login || '') === 'github-actions[bot]')
                .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
              if (markerComments.length > 0) {
                const latestBody = markerComments[markerComments.length - 1].body || '';
                const lineMatch = latestBody.match(/Assigned reviewers:\s*([^\n]+)/i);
                const parsed = lineMatch
                  ? Array.from((lineMatch[1] || '').matchAll(/@([A-Za-z0-9-]+)/g)).map((m) => m[1].toLowerCase())
                  : [];
                reviewerPool = parsed.filter(Boolean);
              }
            }
            if (reviewerPool.length === 0) {
              reviewerPool = approvedOnHead;
            }
            if (reviewerPool.length < requiredReviewerApprovals) {
              core.info(
                `PR #${pr.number} requires ${requiredReviewerApprovals} reviewer approval(s) (author auto-signs 1), but only ${reviewerPool.length} reviewer candidate(s) were resolved.`
              );
              return;
            }

            const requiredReviewers = reviewerPool.slice(0, requiredReviewerApprovals);
            const pending = requiredReviewers.filter((login) => !approvedOnHeadSet.has(login.toLowerCase()));
            if (pending.length > 0) {
              const stale = requiredReviewers.filter((login) => approvedReviewers.includes(login.toLowerCase()) && !approvedOnHeadSet.has(login.toLowerCase()));
              if (stale.length > 0) {
                core.info(`Found stale approvals on older commits from: ${stale.map((x) => '@' + x).join(', ')}`);
              }
              core.info(`Waiting for approvals from: ${pending.map((x) => '@' + x).join(', ')}`);
              return;
            }

            if (fresh.auto_merge) {
              core.info(`Auto-merge already enabled for PR #${pr.number}.`);
              return;
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: SQUASH}) {
                    pullRequest { number }
                  }
                }`,
                { pullRequestId: fresh.node_id }
              );
              core.info(`Enabled auto-merge for PR #${pr.number}.`);
            } catch (error) {
              core.warning(`Could not enable auto-merge via GraphQL: ${error.message}`);
              try {
                const merged = await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                });
                core.info(`Merged PR #${pr.number} directly.`);

                const meaningMatch = body.match(/\*\*Meaning of Signature:\*\*\s*([^\n]+)/i);
                let meaning = meaningMatch ? meaningMatch[1].trim() : '';
                if (!meaning || meaning.startsWith('[')) {
                  meaning = 'Approved Quality Record';
                }

                const rolesMatch = body.match(/\*\*Signer Roles:\*\*\s*([^\n]+)/i);
                let rolesRaw = rolesMatch ? rolesMatch[1].trim() : '';
                if (!rolesRaw || rolesRaw.startsWith('[')) {
                  rolesRaw = 'Quality Assurance Lead';
                }
                const roles = rolesRaw
                  .split(/[;,]/)
                  .map((x) => x.trim())
                  .filter(Boolean);

                const part11RequiredReviewerSignatures = Math.max(0, requiredSignatures - 1);
                const approvedFromPool = reviewerPool.filter((login) => approvedOnHeadSet.has(login.toLowerCase()));
                const authorLogin = (pr.user?.login || '').toLowerCase();
                const reviewerSigners = approvedFromPool.slice(0, part11RequiredReviewerSignatures);
                const finalSigners = [authorLogin, ...reviewerSigners];

                const targetCommit = merged.sha || fresh.merge_commit_sha || fresh.head?.sha || '';
                const repoFull = `${context.repo.owner}/${context.repo.repo}`;
                const targetHash = crypto.createHash('sha256').update(`${repoFull}:${targetCommit}`).digest('hex');
                const signingBaseUrl = (process.env.SIGNATURE_UI_BASE_URL || '').trim().replace(/\/+$/g, '');
                const linkSecret = (process.env.SIGNATURE_LINK_SECRET || '').trim();
                if (!signingBaseUrl) {
                  core.setFailed('Missing SIGNATURE_UI_BASE_URL variable. Configure repository variable SIGNATURE_UI_BASE_URL.');
                  return;
                }
                if (!linkSecret) {
                  core.setFailed('Missing SIGNATURE_LINK_SECRET secret. Configure repository secret SIGNATURE_LINK_SECRET.');
                  return;
                }
                const expirationEpoch = Math.floor(Date.now() / 1000) + (12 * 60 * 60);
                const canonicalize = (map) => Object.keys(map).sort().map((k) => `${k}=${map[k]}`).join('&');
                const buildLink = (payload) => {
                  const sig = crypto
                    .createHmac('sha256', linkSecret)
                    .update(canonicalize(payload))
                    .digest('hex');
                  const params = new URLSearchParams({ ...payload, sig });
                  return `${signingBaseUrl}/sign?${params.toString()}`;
                };
                const runLinks = finalSigners.map((u, i) => {
                  const role = roles[i] || roles[0] || 'Quality Assurance Lead';
                  const payload = {
                    repo: `${context.repo.owner}/${context.repo.repo}`,
                    pr: String(pr.number),
                    hash: targetHash,
                    meaning,
                    role,
                    signer: u.toLowerCase(),
                    required_signatures: String(requiredSignatures),
                    signature_index: String(i + 1),
                    exp: String(expirationEpoch),
                  };
                  return `- @${u} (${role}): [Open Signature Title Page](${buildLink(payload)})`;
                });

                const requestBody = [
                  '<!-- part11-native-signature-request -->',
                  '🛑 Part 11 Signature Required (GitHub App Flow)',
                  '',
                  `PR: #${pr.number}`,
                  `Target commit: \`${targetCommit}\``,
                  `Target hash (merge state): \`${targetHash}\``,
                  `Meaning of signature: **${meaning}**`,
                  `Designated signatory role(s): **${roles.join(', ') || rolesRaw}**`,
                  `Required signatures: **${requiredSignatures}**`,
                  `Reviewer signatures required: \`${part11RequiredReviewerSignatures}\` (author auto-signs 1)`,
                  `Required author signer: **${authorLogin ? '@' + authorLogin : 'unknown'}**`,
                  `Eligible signers: **${finalSigners.length > 0 ? finalSigners.map((x) => '@' + x).join(', ') : 'none found'}**`,
                  '',
                  'Open your signer link, enter only your full legal name, and complete GitHub login to sign:',
                  ...runLinks,
                  '',
                  `Signature service: ${signingBaseUrl}/sign`,
                ].join('\n');

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: requestBody,
                });
                core.info(`Posted fallback Part 11 signature request on merged PR #${pr.number}.`);
              } catch (mergeError) {
                core.warning(`Direct merge attempt failed for PR #${pr.number}: ${mergeError.message}`);
                core.setFailed(
                  `PR #${pr.number} could not be merged by automation. Verify GITHUB_TOKEN write permissions and repository action settings.`
                );
              }
            }
            
