name: 1.5 PR Description Gate
run-name: 1.5 PR Description Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate_description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check PR body sections
        id: structure
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('Not a pull request event. Skipping.');
              return;
            }
            
            const body = pr.body || '';
            const errors = [];
            const bodyWithoutFencedCodeBlocks = body.replace(/```[\s\S]*?```/g, '');
            const bodyWithoutMarkdownCode = bodyWithoutFencedCodeBlocks.replace(/`[^`\n]+`/g, '');
            
            // Check for Summary section
            if (!/^##\s+Summary\b/mi.test(body)) {
              errors.push('Missing "## Summary" section.');
            }
            
            // Check for Why or Context section
            if (!/^##\s+(Why|Context)\b/mi.test(body)) {
              errors.push('Missing "## Why" or "## Context" section. Please explain the reason for the change.');
            }
            
            // Check for Validation or Testing section
            if (!/^##\s+(Validation|Testing)\b/mi.test(body)) {
              errors.push('Missing "## Validation" or "## Testing" section. Please explain how the change was verified.');
            }

            // Reject escaped newline text in normal prose because it breaks review and signature parsing.
            if (/\\n/.test(bodyWithoutMarkdownCode)) {
              errors.push('PR body contains literal "\\n" text outside markdown code. Use real line breaks in markdown and update the PR with --body-file instead of shell-escaped multiline text.');
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            
            if (errors.length > 0) {
              core.setFailed(`PR description does not meet DearAuditor Open QMS Baseline structural requirements:\n- ${errors.join('\n- ')}`);
            } else {
              core.info('PR description structure is compliant.');
            }

            core.setOutput('author_login', pr.user?.login || '');
            core.setOutput('pr_body_base64', Buffer.from(body, 'utf8').toString('base64'));
            core.setOutput('changed_paths_json', JSON.stringify(files.map((f) => String(f.filename || ''))));
            const authorLogin = String(pr.user?.login || '').toLowerCase();
            const changedPaths = files.map((f) => String(f.filename || ''));
            const automationBotLogins = new Set([
              'dearauditor-open-qms-bot',
              'dearauditor-open-qms-bot[bot]',
              'dearauditor-qms-baseline-bot',
              'dearauditor-qms-baseline-sign',
              'github-actions[bot]',
            ]);
            const generatedTrainingStatusPaths = new Set([
              'records/training/training_status.csv',
              'records/training/training_status.md',
              'records/training/training_status.yml',
            ]);
            const isGeneratedTrainingStatusRefresh = (
              changedPaths.length > 0 &&
              changedPaths.every((path) => generatedTrainingStatusPaths.has(path))
            );
            core.setOutput(
              'skip_signer_role_policy',
              automationBotLogins.has(authorLogin) && isGeneratedTrainingStatusRefresh ? 'true' : 'false'
            );

      - name: Validate signer-role policy
        if: steps.structure.outputs.skip_signer_role_policy != 'true'
        run: |
          python3 scripts/resolve_signature_policy.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --author "${AUTHOR_LOGIN}" \
            --body-base64 "${PR_BODY_BASE64}" \
            --paths-json "${CHANGED_PATHS_JSON}"
        env:
          AUTHOR_LOGIN: ${{ steps.structure.outputs.author_login }}
          PR_BODY_BASE64: ${{ steps.structure.outputs.pr_body_base64 }}
          CHANGED_PATHS_JSON: ${{ steps.structure.outputs.changed_paths_json }}

      - name: Skip signer-role policy for generated training status refresh PRs
        if: steps.structure.outputs.skip_signer_role_policy == 'true'
        run: |
          echo "Skipping signer-role policy for bot-authored generated training status refresh PR."
