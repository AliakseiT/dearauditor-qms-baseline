name: Training Issue Signature Flow
run-name: Training issue signature flow (${{ github.event_name }})

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: training-issue-signature-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  request_signature_on_checklist_completion:
    if: >-
      github.event_name == 'issues' &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token for issue updates
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SIGNATURE_APP_ID }}
          private-key: ${{ secrets.SIGNATURE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Post signature request when checklist is complete
        uses: actions/github-script@v7
        env:
          SIGNATURE_UI_BASE_URL: ${{ vars.SIGNATURE_UI_BASE_URL }}
          SIGNATURE_LINK_SECRET: ${{ secrets.SIGNATURE_LINK_SECRET }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const crypto = require('crypto');
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map((l) => (l.name || '').toLowerCase());
            if (!labels.includes('training-diff')) {
              core.info(`Issue #${issue.number} is not training-diff; skipping.`);
              return;
            }

            const body = String(issue.body || '');
            const sectionMatch = body.match(/### SOP Delta Checklist([\s\S]*?)(?:\n###\s|\n##\s|$)/i);
            if (!sectionMatch) {
              core.info(`Issue #${issue.number} has no SOP Delta Checklist section; skipping.`);
              return;
            }
            const checklistSection = sectionMatch[1] || '';
            const totalTasks = (checklistSection.match(/^- \[(?: |x|X)\] .+$/gm) || []).length;
            const openTasks = (checklistSection.match(/^- \[ \] .+$/gm) || []).length;
            if (totalTasks === 0) {
              core.info(`Issue #${issue.number} has no checklist items; skipping.`);
              return;
            }
            if (openTasks > 0) {
              core.info(`Issue #${issue.number} still has ${openTasks}/${totalTasks} unchecked items; skipping signature request.`);
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });
            const hasRequest = comments.some((c) => String(c.body || '').includes('<!-- training-signature-request -->'));
            const hasAttestation = comments.some((c) => {
              const b = String(c.body || '');
              return b.includes('<!-- SIGNATURE_ATTESTATION_V1 -->') ||
                b.includes('<!-- PART11_ATTESTATION_V1 -->') ||
                b.includes('<!-- signature-native-attestation -->') ||
                b.includes('<!-- part11-native-attestation -->');
            });
            if (hasRequest || hasAttestation) {
              core.info(`Issue #${issue.number} already has signature request/attestation; skipping.`);
              return;
            }

            const markerMatch = body.match(/training-release:user=([A-Za-z0-9-]+)/i)
              || body.match(/training-diff-consolidated:user=([A-Za-z0-9-]+)/i);
            const markerUser = markerMatch ? markerMatch[1].toLowerCase() : '';
            let trainee = ((issue.assignees || [])[0]?.login || '').toLowerCase();

            if (!trainee && markerUser) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [markerUser],
              });
              trainee = markerUser;
              core.info(`Assigned issue #${issue.number} to @${markerUser} from marker metadata.`);
            }
            if (!trainee) {
              core.setFailed(`Issue #${issue.number} has no assignee and no training marker user; cannot create signature request.`);
              return;
            }

            const signingBaseUrl = (process.env.SIGNATURE_UI_BASE_URL || '').trim().replace(/\/+$/g, '');
            const linkSecret = (process.env.SIGNATURE_LINK_SECRET || '').trim();
            if (!signingBaseUrl) {
              core.setFailed('Missing SIGNATURE_UI_BASE_URL variable.');
              return;
            }
            if (!linkSecret) {
              core.setFailed('Missing SIGNATURE_LINK_SECRET secret.');
              return;
            }

            const repoFull = `${context.repo.owner}/${context.repo.repo}`;
            const bodyHash = crypto.createHash('sha256').update(body).digest('hex');
            const targetHash = crypto.createHash('sha256').update(`${repoFull}:training_issue:${issue.number}:${bodyHash}`).digest('hex');
            const meaning = 'Completed QMS Training Review';
            const role = 'Trained Personnel';
            const requiredSignatures = '1';
            const signatureIndex = '1';
            const expirationEpoch = Math.floor(Date.now() / 1000) + (12 * 60 * 60);

            const payload = {
              repo: repoFull,
              pr: String(issue.number),
              hash: targetHash,
              meaning,
              role,
              signer: trainee,
              required_signatures: requiredSignatures,
              signature_index: signatureIndex,
              exp: String(expirationEpoch),
            };
            const canonical = Object.keys(payload).sort().map((k) => `${k}=${payload[k]}`).join('&');
            const sig = crypto.createHmac('sha256', linkSecret).update(canonical).digest('hex');
            const link = `${signingBaseUrl}/sign?${new URLSearchParams({ ...payload, sig }).toString()}`;

            const requestBody = [
              '<!-- training-signature-request -->',
              '<!-- signature-native-signature-request -->',
              '🛑 Signature Required',
              '',
              `Issue: #${issue.number}`,
              `Target hash (merge state): \`${targetHash}\``,
              `Meaning of signature: **${meaning}**`,
              `Designated signatory role(s): **${role}**`,
              `Required signatures: **${requiredSignatures}**`,
              `Eligible signers: **@${trainee}**`,
              '',
              `- @${trainee}: [Open Signature Title Page](${link})`,
              '',
              `Signature service: ${signingBaseUrl}/sign`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: requestBody,
            });

  reconcile_signed_training_issues:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token for issue updates
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SIGNATURE_APP_ID }}
          private-key: ${{ secrets.SIGNATURE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Close signed training issues and publish immutable release
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            function parseJsonBlock(text) {
              const m = String(text || '').match(/```json\s*([\s\S]*?)```/i);
              if (!m || !m[1]) return null;
              try { return JSON.parse(m[1]); } catch { return null; }
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'training-diff',
              per_page: 100,
            });

            let closedCount = 0;
            let skippedCount = 0;

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const issueBody = String(issue.body || '');
              const checklistMatch = issueBody.match(/### SOP Delta Checklist([\s\S]*?)(?:\n###\s|\n##\s|$)/i);
              if (!checklistMatch) { skippedCount += 1; continue; }
              const checklistSection = checklistMatch[1] || '';
              const openTasks = (checklistSection.match(/^- \[ \] .+$/gm) || []).length;
              if (openTasks > 0) { skippedCount += 1; continue; }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100,
              });

              const alreadyCompleted = comments.some((c) => String(c.body || '').includes('<!-- training-signature-complete -->'));
              if (alreadyCompleted) { skippedCount += 1; continue; }

              const markerMatch = issueBody.match(/training-release:user=([A-Za-z0-9-]+)/i)
                || issueBody.match(/training-diff-consolidated:user=([A-Za-z0-9-]+)/i);
              const markerUser = markerMatch ? String(markerMatch[1] || '').toLowerCase() : '';
              const assigneeUser = ((issue.assignees || [])[0]?.login || '').toLowerCase();
              const expectedSigner = assigneeUser || markerUser;

              const candidateComments = comments
                .filter((c) => {
                  const b = String(c.body || '');
                  return b.includes('<!-- SIGNATURE_ATTESTATION_V1 -->') ||
                    b.includes('<!-- PART11_ATTESTATION_V1 -->') ||
                    b.includes('<!-- signature-native-attestation -->') ||
                    b.includes('<!-- part11-native-attestation -->');
                })
                .sort((a, b) => Date.parse(a.created_at || 0) - Date.parse(b.created_at || 0));

              let selected = null;
              let selectedCommentUrl = '';
              for (let i = candidateComments.length - 1; i >= 0; i -= 1) {
                const c = candidateComments[i];
                const parsed = parseJsonBlock(c.body || '');
                if (!parsed) continue;

                const attRepo = String(parsed.repository || '').toLowerCase();
                const expectedRepo = `${context.repo.owner}/${context.repo.repo}`.toLowerCase();
                const attNumber = Number.parseInt(String(parsed.pr_number || ''), 10);
                if (attRepo !== expectedRepo || attNumber !== issue.number) continue;

                const signer = String(parsed.user_id || parsed.actor_login || '').toLowerCase();
                if (expectedSigner && signer !== expectedSigner) continue;

                selected = parsed;
                selectedCommentUrl = String(c.html_url || '');
                break;
              }

              if (!selected) { skippedCount += 1; continue; }

              const targetHash = String(selected.commit_hash || selected.target_hash || '').toLowerCase();
              const hashShort = (targetHash || 'nohash').slice(0, 12);
              const baseTag = `sig-train-${issue.number}-h${hashShort}`;

              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              let maxRev = 0;
              for (const rel of releases) {
                const tag = String(rel.tag_name || '');
                const m = tag.match(new RegExp(`^${baseTag}-r(\\d+)$`));
                if (!m) continue;
                const n = Number.parseInt(m[1], 10);
                if (Number.isInteger(n) && n > maxRev) maxRev = n;
              }
              const nextRev = String(maxRev + 1).padStart(2, '0');
              const tagName = `${baseTag}-r${nextRev}`;

              const bundle = {
                schema_version: 1,
                attestation_scope: 'training_issue_signature',
                source_repository: `${context.repo.owner}/${context.repo.repo}`,
                source_issue: issue.number,
                source_issue_title: String(issue.title || ''),
                source_issue_url: String(issue.html_url || ''),
                source_attestation_comment_url: selectedCommentUrl,
                part11_target_hash: targetHash,
                captured_at_utc: new Date().toISOString(),
                signed_attestations: [selected],
              };
              const bundleJson = `${JSON.stringify(bundle, null, 2)}\n`;

              const release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                target_commitish: String(context.payload.repository?.default_branch || 'main'),
                name: `Training Signature: Issue #${issue.number}`,
                body: [
                  '# Immutable Training Signature Record',
                  '',
                  `- Source issue: #${issue.number}`,
                  `- Source issue URL: ${String(issue.html_url || 'n/a')}`,
                  `- Source issue title: ${String(issue.title || 'n/a')}`,
                  `- Target hash: \`${targetHash || 'n/a'}\``,
                  `- Signer: \`${String(selected.user_id || selected.actor_login || 'n/a')}\``,
                  `- Meaning: \`${String(selected.meaning_of_signature || 'Completed QMS Training Review')}\``,
                  '',
                  'Assets:',
                  '- `signed_attestation.json`',
                ].join('\n'),
                draft: false,
                prerelease: false,
              });

              await github.request('POST {upload_url}', {
                upload_url: release.data.upload_url,
                name: 'signed_attestation.json',
                data: Buffer.from(bundleJson, 'utf8'),
                headers: {
                  'content-type': 'application/json',
                  'content-length': Buffer.byteLength(bundleJson),
                },
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });

              const lines = [
                '<!-- training-signature-complete -->',
                '✅ Training checklist signed. Issue closed automatically.',
                `Immutable signature release: ${String(release.data.html_url || '')}`,
                `Release tag: \`${tagName}\``,
              ];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: lines.join('\n'),
              });

              closedCount += 1;
            }

            core.summary
              .addHeading('Training signature reconciliation')
              .addRaw(`Closed issues: ${closedCount}\n`, true)
              .addRaw(`Skipped issues: ${skippedCount}\n`, true)
              .write();
