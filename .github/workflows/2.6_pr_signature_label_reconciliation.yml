name: 2.6 PR Signature Label Reconciliation
run-name: 2.6 Signature Label Reconciliation

on:
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Merged pull request number to reconcile signature labels for"
        required: true

permissions:
  issues: write
  pull-requests: read

jobs:
  reconcile_labels:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request != null &&
        (
          contains(github.event.comment.body, '<!-- signature-native-signature-request -->') ||
          contains(github.event.comment.body, '<!-- part11-native-signature-request -->') ||
          contains(github.event.comment.body, '<!-- signature-request -->') ||
          contains(github.event.comment.body, '<!-- part11-signature-request -->') ||
          contains(github.event.comment.body, '<!-- SIGNATURE_ATTESTATION_V1 -->') ||
          contains(github.event.comment.body, '<!-- PART11_ATTESTATION_V1 -->') ||
          contains(github.event.comment.body, '<!-- signature-native-attestation -->') ||
          contains(github.event.comment.body, '<!-- part11-native-attestation -->')
        )
      )
    concurrency:
      group: signature-label-reconcile-${{ github.event.issue.number || inputs.pr_number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      # issue_comment and workflow_dispatch events run against the default
      # branch, so this checks out the trusted default-branch copy of
      # .github/scripts/ for the shared signature-request parser below.
      - name: Checkout QMS scripts
        uses: actions/checkout@v5

      - name: Create GitHub App token for label reconciliation
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.QMS_BOT_APP_ID }}
          private-key: ${{ secrets.QMS_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Reconcile signature labels on PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            // Trusted default-branch module (checked out above). Prefers the
            // structured SIGNATURE_REQUEST_CONTEXT_V1 block and falls back to
            // the human-readable list in BOTH its Markdown (pre-#412) and HTML
            // (post-#412) shapes. Replaces the inline parser that regressed
            // with PR #412 (Markdown-only regexes returned null on HTML
            // comments even when the structured block parsed, so merged PRs
            // never received signature/complete — see QMS-2026-07-09-R005).
            // Unit-tested in .github/scripts/signature-request-context.test.js.
            const { parseSignatureRequestContext } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/signature-request-context.js`);

            const ACTIVE_LABELS = {
              outstanding: {
                name: 'signature/outstanding',
                color: 'FBCA04',
                description: 'Merged PR is awaiting required electronic signatures.',
              },
              complete: {
                name: 'signature/complete',
                color: '0E8A16',
                description: 'Merged PR has collected the required electronic signatures.',
              },
            };
            const LEGACY_LABELS = [
              'signatures/outstanding',
              'signatures/complete',
            ];
            const inputPrNumber = Number.parseInt((process.env.WORKFLOW_INPUT_PR_NUMBER || '').trim(), 10);
            const eventPrNumber = context.payload.issue?.number;
            const prNumber = Number.isInteger(inputPrNumber) && inputPrNumber > 0
              ? inputPrNumber
              : eventPrNumber;

            if (!Number.isInteger(prNumber) || prNumber < 1) {
              core.setFailed('A valid PR number is required.');
              return;
            }

            try {
              await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
            } catch (error) {
              if (error.status === 404) {
                core.info(`Issue #${prNumber} is not a pull request; skipping signature label reconciliation.`);
                return;
              }
              throw error;
            }

            function parseJsonBlock(text) {
              const match = String(text || '').match(/```json\s*([\s\S]*?)```/i);
              if (!match || !match[1]) return null;
              try {
                return JSON.parse(match[1].trim());
              } catch {
                return null;
              }
            }

            function normalizeAttestation(comment) {
              const body = String(comment.body || '');
              const payload = parseJsonBlock(body);
              if (!payload) return null;

              if (body.includes('<!-- SIGNATURE_ATTESTATION_V1 -->') || body.includes('<!-- PART11_ATTESTATION_V1 -->')) {
                return {
                  signerLogin: String(payload.user_id || '').trim().toLowerCase(),
                  signerRole: String(payload.signer_role || '').trim(),
                  targetHash: String(payload.target_hash || payload.commit_hash || '').trim().toLowerCase(),
                  meaning: String(payload.meaning_of_signature || '').trim(),
                };
              }

              if (body.includes('<!-- signature-native-attestation -->') || body.includes('<!-- part11-native-attestation -->')) {
                return {
                  signerLogin: String(payload.actor_login || payload.user_id || '').trim().toLowerCase(),
                  signerRole: String(payload.signer_role || '').trim(),
                  targetHash: String(payload.target_hash || payload.commit_hash || '').trim().toLowerCase(),
                  meaning: String(payload.meaning_of_signature || '').trim(),
                };
              }

              return null;
            }

            async function ensureLabel(name, color, description) {
              try {
                const existing = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
                if (
                  String(existing.data.color || '').toUpperCase() !== String(color || '').toUpperCase() ||
                  String(existing.data.description || '') !== String(description || '')
                ) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    new_name: name,
                    color,
                    description,
                  });
                }
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                  description,
                });
              }
            }

            async function applyState(labelToAdd, labelsToRemove) {
              await ensureLabel(
                ACTIVE_LABELS.outstanding.name,
                ACTIVE_LABELS.outstanding.color,
                ACTIVE_LABELS.outstanding.description
              );
              await ensureLabel(
                ACTIVE_LABELS.complete.name,
                ACTIVE_LABELS.complete.color,
                ACTIVE_LABELS.complete.description
              );
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: [labelToAdd],
              });
              for (const labelName of labelsToRemove) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    name: labelName,
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const requestComments = comments
              .filter((comment) => {
                const body = String(comment.body || '');
                return body.includes('<!-- signature-native-signature-request -->') ||
                  body.includes('<!-- part11-native-signature-request -->') ||
                  body.includes('<!-- signature-request -->') ||
                  body.includes('<!-- part11-signature-request -->');
              })
              .sort((a, b) => Date.parse(a.created_at || 0) - Date.parse(b.created_at || 0));

            if (requestComments.length === 0) {
              core.info(`PR #${prNumber} has no signature request comment; leaving labels unchanged.`);
              return;
            }

            const request = parseSignatureRequestContext(requestComments[requestComments.length - 1].body || '');
            if (!request) {
              core.warning(`Could not parse the latest signature request context for PR #${prNumber}; leaving labels unchanged.`);
              return;
            }

            const signerRoleMap = new Map(request.signers.map((entry) => [entry.signer, entry.role.toLowerCase()]));
            const roleSet = new Set(request.roles.map((role) => role.toLowerCase()));
            const eligibleSignerSet = new Set(request.eligibleSigners.map((signer) => signer.toLowerCase()));
            const signedBy = new Set();

            for (const comment of comments) {
              const attestation = normalizeAttestation(comment);
              if (!attestation) continue;
              if (attestation.targetHash !== request.hash) continue;
              if (attestation.meaning !== request.meaning) continue;
              if (!attestation.signerLogin) continue;
              if (eligibleSignerSet.size > 0 && !eligibleSignerSet.has(attestation.signerLogin)) continue;

              const expectedRole = signerRoleMap.get(attestation.signerLogin);
              if (expectedRole) {
                if (attestation.signerRole.toLowerCase() !== expectedRole) continue;
              } else if (roleSet.size > 0 && !roleSet.has(attestation.signerRole.toLowerCase())) {
                continue;
              }

              signedBy.add(attestation.signerLogin);
            }

            if (signedBy.size >= request.requiredSignatures) {
              await applyState(ACTIVE_LABELS.complete.name, [
                ACTIVE_LABELS.outstanding.name,
                ...LEGACY_LABELS,
              ]);
              core.info(`PR #${prNumber} has ${signedBy.size}/${request.requiredSignatures} required signatures. Marked ${ACTIVE_LABELS.complete.name}.`);
              return;
            }

            await applyState(ACTIVE_LABELS.outstanding.name, [
              ACTIVE_LABELS.complete.name,
              ...LEGACY_LABELS,
            ]);
            core.info(`PR #${prNumber} has ${signedBy.size}/${request.requiredSignatures} required signatures. Marked ${ACTIVE_LABELS.outstanding.name}.`);
        env:
          WORKFLOW_INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
