name: Issue-to-PR Part 11 Sign-Off

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: part11-post-merge-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  request_native_signatures:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Parse merged PR signature requirements
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            const issueMatch = body.match(/Issue\s+#(\d+)/i);
            if (!issueMatch) {
              core.setFailed('Execution Record must reference an Issue number (e.g., "Issue #12").');
              return;
            }

            const meaningMatch = body.match(/\*\*Meaning of Signature:\*\*\s*([^\n]+)/i);
            let meaning = meaningMatch ? meaningMatch[1].trim() : '';
            if (!meaning || meaning.startsWith('[')) {
              meaning = 'Approved Quality Record';
            }

            const rolesMatch = body.match(/\*\*Signer Roles:\*\*\s*([^\n]+)/i);
            let roles = rolesMatch ? rolesMatch[1].trim() : '';
            if (!roles || roles.startsWith('[')) {
              roles = 'Quality Assurance Lead';
            }

            const sigMatch = body.match(/\*\*Required Signatures:\*\*\s*([^\n]+)/i);
            let required = sigMatch ? Number.parseInt(sigMatch[1].trim(), 10) : 1;
            if (!Number.isInteger(required) || required < 1) {
              required = 1;
            }

            const targetCommit = pr.merge_commit_sha || pr.head.sha;
            const repoFull = `${context.repo.owner}/${context.repo.repo}`;
            const targetHash = crypto.createHash('sha256').update(`${repoFull}:${targetCommit}`).digest('hex');

            const fresh = (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            })).data;
            const requestedReviewers = (fresh.requested_reviewers || [])
              .map((r) => (r.login || '').toLowerCase())
              .filter(Boolean);
            if (requestedReviewers.length === 0) {
              core.setFailed(`PR #${pr.number} has no assigned reviewers; cannot determine eligible Part 11 signers.`);
              return;
            }
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const latestStateByUser = new Map();
            for (const review of reviews) {
              const login = (review.user?.login || '').trim();
              if (!login) continue;
              latestStateByUser.set(login.toLowerCase(), String(review.state || '').toUpperCase());
            }
            const approvedRequested = requestedReviewers.filter((login) => latestStateByUser.get(login) === 'APPROVED');
            if (approvedRequested.length === 0) {
              core.setFailed(`PR #${pr.number} has no approved assigned reviewers; cannot request Part 11 signatures.`);
              return;
            }
            if (approvedRequested.length < required) {
              core.setFailed(
                `PR #${pr.number} requires ${required} signature(s), but only ${approvedRequested.length} assigned reviewer(s) approved.`
              );
              return;
            }

            core.setOutput('issue_number', issueMatch[1]);
            core.setOutput('meaning_of_signature', meaning);
            core.setOutput('signatory_roles', roles);
            core.setOutput('required_signatures', String(required));
            core.setOutput('target_hash', targetHash);
            core.setOutput('target_commit', targetCommit);
            core.setOutput('approved_signers_csv', approvedRequested.join(','));

      - name: Post Git-native signature request on merged PR
        uses: actions/github-script@v7
        env:
          MEANING: ${{ steps.parse.outputs.meaning_of_signature }}
          ROLES: ${{ steps.parse.outputs.signatory_roles }}
          REQUIRED: ${{ steps.parse.outputs.required_signatures }}
          TARGET_HASH: ${{ steps.parse.outputs.target_hash }}
          TARGET_COMMIT: ${{ steps.parse.outputs.target_commit }}
          APPROVED_SIGNERS_CSV: ${{ steps.parse.outputs.approved_signers_csv }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const workflowUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/workflows/part11_git_native_signature.yml`;
            const roles = (process.env.ROLES || '')
              .split(/[;,]/)
              .map((x) => x.trim())
              .filter(Boolean);
            const approvedSigners = (process.env.APPROVED_SIGNERS_CSV || '')
              .split(',')
              .map((x) => x.trim())
              .filter(Boolean);
            const defaultAuth = 'GitHub session re-authenticated';
            const signCommands = approvedSigners.length > 0
              ? approvedSigners.map((u, i) => {
                const role = roles[i] || roles[0] || 'Quality Assurance Lead';
                return `- @${u}: \`/part11-sign meaning=\"${process.env.MEANING}\" role=\"${role}\" auth=\"${defaultAuth}\"\``;
              })
              : ['- No eligible approved assigned reviewers found.'];

            const body = [
              '<!-- part11-native-signature-request -->',
              '🛑 Part 11 Signature Required (Git-Native)',
              '',
              `PR: #${pr.number}`,
              `Target commit: \`${process.env.TARGET_COMMIT}\``,
              `Target hash: \`${process.env.TARGET_HASH}\``,
              `Meaning of signature: \`${process.env.MEANING}\``,
              `Signer role(s): \`${process.env.ROLES}\``,
              `Required signatures: \`${process.env.REQUIRED}\``,
              `Eligible approver signers: ${approvedSigners.length > 0 ? approvedSigners.map((x) => '@' + x).join(', ') : 'none found'}`,
              '',
              'Fastest path: sign by replying on this PR with one of these commands:',
              ...signCommands,
              '',
              'Alternative: workflow-dispatch (no browser PAT entry required):',
              `1. Open \`${workflowUrl}\``,
              `2. Run workflow \`Part 11 Git-Native Signature\` with:`,
              `   - pr_number: \`${pr.number}\``,
              `   - meaning_of_signature: \`${process.env.MEANING}\``,
              '   - signer_role: one of required roles',
              `   - auth_method: \`${defaultAuth}\``,
              '',
              'Each signer run adds a cryptographically sealed attestation comment and run artifact.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
