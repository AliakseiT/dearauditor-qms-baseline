name: 1.1 Auto Assign Signatory Reviewers
run-name: 1.1 Reviewer Assignment

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  assign_reviewers:
    if: github.event.pull_request.draft == false && github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect co-approval policy from changed paths
        id: policy
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const paths = files.map((f) => String(f.filename || ''));
            const hasPath = (prefix) => paths.some((p) => p.startsWith(prefix));
            const isRecordArtifactPath = (path) => path.startsWith('records/') && /\.(md|ya?ml|json)$/i.test(path);
            const isTemplateRecordPath = (path) => /(^|[_-])template\.(md|ya?ml|json)$/i.test(path.split('/').pop() || '');
            const isRecordIndexPath = (path) => path.startsWith('records/') && /(^|\/)README\.md$/i.test(path);
            const isExecutionRecordPath = (path) =>
              isRecordArtifactPath(path) &&
              !isTemplateRecordPath(path) &&
              !isRecordIndexPath(path);
            const reasons = [];
            if (hasPath('qm/') || hasPath('sops/')) reasons.push('controlled documents (/qm, /sops)');
            if (paths.some((path) => isExecutionRecordPath(path))) reasons.push('execution records (/records, excluding templates and index pages)');
            if (paths.some((path) => isExecutionRecordPath(path) && path.startsWith('records/management-reviews/'))) reasons.push('management review records (/records/management-reviews)');
            if (hasPath('matrices/')) reasons.push('matrix/role files (/matrices)');

            const policyMin = reasons.length > 0 ? 1 : 0;
            const effectiveRequired = policyMin;

            core.setOutput('coapproval_required', reasons.length > 0 ? 'true' : 'false');
            core.setOutput('coapproval_reasons', reasons.join('; '));
            core.setOutput('effective_required_reviewer_signatures', String(effectiveRequired));
            core.setOutput('changed_paths_json', JSON.stringify(paths));

      - name: Build reviewer candidates from role matrix and CODEOWNERS
        id: plan
        run: |
          python3 scripts/resolve_reviewer_candidates.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --paths-json "${CHANGED_PATHS_JSON}" \
            --github-output "$GITHUB_OUTPUT"
        env:
          CHANGED_PATHS_JSON: ${{ steps.policy.outputs.changed_paths_json }}

      - name: Validate candidate availability
        env:
          REQUIRED_REVIEWER_SIGNATURES: ${{ steps.policy.outputs.effective_required_reviewer_signatures }}
          CANDIDATES_CSV: ${{ steps.plan.outputs.reviewer_candidates_csv }}
        run: |
          required="${REQUIRED_REVIEWER_SIGNATURES:-0}"
          candidates="${CANDIDATES_CSV:-}"
          if [ "$required" -gt 0 ] && [ -z "$candidates" ]; then
            echo "Required reviewer signatures: $required"
            echo "No reviewer candidates were resolved from CODEOWNERS or the fallback role matrix."
            exit 1
          fi

      - name: Create GitHub App token for PR updates
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.QMS_BOT_APP_ID }}
          private-key: ${{ secrets.QMS_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Request or Remove reviewers from collaborators
        uses: actions/github-script@v8
        env:
          CODEOWNERS_CANDIDATES_CSV: ${{ steps.plan.outputs.codeowners_candidates_csv }}
          ROLE_MATRIX_CANDIDATES_CSV: ${{ steps.plan.outputs.role_matrix_candidates_csv }}
          CANDIDATE_SUMMARY: ${{ steps.plan.outputs.candidate_resolution_summary }}
          CODEOWNERS_FILE: ${{ steps.plan.outputs.codeowners_file }}
          REQUIRED_REVIEWER_SIGNATURES: ${{ steps.policy.outputs.effective_required_reviewer_signatures }}
          ROLE_IDS: ${{ steps.plan.outputs.fallback_role_ids }}
          COAPPROVAL_REQUIRED: ${{ steps.policy.outputs.coapproval_required }}
          COAPPROVAL_REASONS: ${{ steps.policy.outputs.coapproval_reasons }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr || pr.state !== 'open') {
              core.info('Pull request is not open; reviewer assignment skipped.');
              return;
            }

            const author = (pr.user?.login || '').toLowerCase();
            const codeownersCandidates = (process.env.CODEOWNERS_CANDIDATES_CSV || '')
              .split(',')
              .map((x) => x.trim())
              .filter(Boolean);
            const roleMatrixCandidates = (process.env.ROLE_MATRIX_CANDIDATES_CSV || '')
              .split(',')
              .map((x) => x.trim())
              .filter(Boolean);
            
            const requiredReviewerSignatures = Math.max(0, Number.parseInt(process.env.REQUIRED_REVIEWER_SIGNATURES || '0', 10) || 0);

            const marker = '<!-- signature-auto-reviewers -->';
            const legacyMarker = '<!-- part11-auto-reviewers -->';
            const automationBotLogins = new Set(['dearauditor-open-qms-bot', 'dearauditor-open-qms-bot[bot]', 'dearauditor-qms-baseline-bot', 'dearauditor-qms-baseline-sign', 'github-actions[bot]']);

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find((c) => {
              const body = c.body || '';
              const login = String(c.user?.login || '').toLowerCase();
              return (body.includes(marker) || body.includes(legacyMarker)) && automationBotLogins.has(login);
            });

            const prData = (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            })).data;

            const existingReviewers = prData.requested_reviewers || [];
            const roleIds = (process.env.ROLE_IDS || '').split(',').map((x) => x.trim()).filter(Boolean);
            const coapprovalRequired = (process.env.COAPPROVAL_REQUIRED || '').toLowerCase() === 'true';
            const coapprovalReasons = (process.env.COAPPROVAL_REASONS || '').trim();
            const candidateSummary = (process.env.CANDIDATE_SUMMARY || '').trim();
            const codeownersFile = (process.env.CODEOWNERS_FILE || '').trim();
            const parseAssignedReviewers = (body) => {
              const assignedLine = String(body || '').split('\n').find((line) => line.startsWith('Assigned reviewers:'));
              return assignedLine
                ? assignedLine
                    .replace('Assigned reviewers:', '')
                    .split(',')
                    .map((u) => u.replace(/@/g, '').trim().toLowerCase())
                    .filter(Boolean)
                : [];
            };
            const buildCommentBody = (assignedReviewers) => {
              const lines = [
                marker,
                '🤖 Auto-assigned signature reviewers from CODEOWNERS and role matrix',
                '',
                `Path policy triggered assignment of role IDs: \`${roleIds.join(', ') || 'none'}\``,
                `Reviewer candidate resolution: ${candidateSummary || 'fallback role matrix only'}`,
                `CODEOWNERS file: \`${codeownersFile || 'not found'}\``,
                'Co-approval policy requires a non-author reviewer when PR changes include: SOP files (`/sops`), execution records under `/records` (excluding templates and index pages), or matrix/role files (`/matrices`).',
                `Co-approval triggered for this PR: \`${coapprovalRequired ? 'yes' : 'no'}\`${coapprovalReasons ? ` (${coapprovalReasons})` : ''}`,
                `Reviewer approval required for merge: \`${requiredReviewerSignatures > 0 ? 'yes' : 'no'}\``,
                `Required reviewer approvals for merge: \`${requiredReviewerSignatures}\``,
                `Assigned reviewers: ${assignedReviewers.length > 0 ? assignedReviewers.map((u) => `@${u}`).join(', ') : 'none intentionally required'}`,
                '',
                requiredReviewerSignatures > 0
                  ? 'Auto-merge workflow will enable merge once the required number of approvals is collected from the assigned reviewer pool.'
                  : 'Manual merge by a single expert is required; auto-merge remains disabled when no reviewer approval is required.',
              ];
              return lines.join('\n');
            };
            
            // IF NO REVIEWERS REQUIRED -> REMOVE EXISTING (ONLY IF ASSIGNED BY BOT)
            if (requiredReviewerSignatures === 0) {
              if (existingReviewers.length > 0 && existing) {
                const botAssigned = parseAssignedReviewers(existing.body || '');
                if (botAssigned.length > 0) {
                  const toRemove = existingReviewers.filter(r => botAssigned.includes((r.login || '').toLowerCase())).map(r => r.login);
                  
                  if (toRemove.length > 0) {
                    await github.rest.pulls.removeRequestedReviewers({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: pr.number,
                      reviewers: toRemove
                    });
                    core.info(`Removed automatically assigned reviewers: ${toRemove.join(', ')}`);
                  } else {
                    core.info('No automatically assigned reviewers found to remove.');
                  }
                } else {
                  core.info('Could not parse assigned reviewers from bot comment.');
                }
              } else {
                core.info('No reviewers required, and none assigned by bot to remove.');
              }
              const desiredBody = buildCommentBody([]);
              if (existing) {
                if ((existing.body || '') === desiredBody) {
                  core.info('Auto-reviewer comment already reflects no-review policy.');
                } else {
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: existing.id,
                    body: desiredBody,
                  });
                }
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: desiredBody,
                });
              }
              return;
            }

            // IF REVIEWERS REQUIRED -> ADD THEM
            const collaborators = await github.paginate(github.rest.repos.listCollaborators, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const collaboratorSet = new Set(collaborators.map((c) => (c.login || '').toLowerCase()));
            const toEligible = (candidates) => candidates.filter((login) => {
              const key = login.toLowerCase();
              if (key === author) return false;
              return collaboratorSet.has(key);
            });
            const codeownersEligible = toEligible(codeownersCandidates);
            const roleMatrixEligible = toEligible(roleMatrixCandidates);
            const selected = [];
            const selectedSet = new Set();
            for (const login of codeownersEligible) {
              const key = login.toLowerCase();
              if (selectedSet.has(key)) continue;
              selectedSet.add(key);
              selected.push(login);
            }
            for (const login of roleMatrixEligible) {
              if (selected.length >= requiredReviewerSignatures) break;
              const key = login.toLowerCase();
              if (selectedSet.has(key)) continue;
              selectedSet.add(key);
              selected.push(login);
            }

            if (selected.length < requiredReviewerSignatures) {
              core.setFailed(
                `Co-approval policy requires ${requiredReviewerSignatures} reviewer signature(s). Only ${selected.length} eligible collaborator(s) were found after evaluating CODEOWNERS (${codeownersEligible.length}) and fallback role-matrix candidates (${roleMatrixEligible.length}).`
              );
              return;
            }

            const alreadyRequested = new Set(existingReviewers.map((r) => (r.login || '').toLowerCase()));
            const toRequest = selected.filter((u) => !alreadyRequested.has(u.toLowerCase()));
            
            if (toRequest.length > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: toRequest,
              });
            }

            const desiredBody = buildCommentBody(selected);
            if (existing && (existing.body || '') === desiredBody) {
              core.info('Assigned reviewer policy comment is unchanged; skip auto-reviewer comment update.');
              return;
            }

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: desiredBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: desiredBody,
              });
            }
