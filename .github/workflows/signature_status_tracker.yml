name: Signature Attention Project Sync

on:
  pull_request:
    types: [closed]
  issues:
    types: [opened, reopened, closed, labeled, unlabeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

concurrency:
  group: signature-attention-project-sync
  cancel-in-progress: false

jobs:
  sync_signature_attention_project:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate signatures and sync Project 1
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: '1'
          HORIZON_DAYS: '45'
          MAX_CLOSED_PRS: '150'
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN || github.token }}
          script: |
            const repo = context.repo;
            const projectNumber = Number(process.env.PROJECT_NUMBER || '1');
            const horizonDays = Number(process.env.HORIZON_DAYS || '45');
            const maxClosedPrs = Number(process.env.MAX_CLOSED_PRS || '150');

            const SIGNATURE_STATE_LABELS = [
              'signature/outstanding',
              'signature/complete',
              'signature/not-required',
              'signature/blocked',
            ];
            const LABEL_META = {
              'signature/outstanding': { color: 'D73A49', description: 'Required signatures are still outstanding.' },
              'signature/complete': { color: '1A7F37', description: 'All required signatures are captured.' },
              'signature/not-required': { color: '6E7781', description: 'This PR does not require signatures by policy.' },
              'signature/blocked': { color: 'B60205', description: 'Signature required but request comment is missing.' },
            };

            function normalizeLogin(v) {
              return String(v || '').trim().replace(/^@+/, '').toLowerCase();
            }

            function uniq(arr) {
              return Array.from(new Set(arr));
            }

            function parseRequiredSignaturesFromBody(body) {
              const m = String(body || '').match(/\*\*Required Signatures:\*\*\s*([^\n]+)/i);
              if (!m) return 0;
              const n = Number.parseInt(String(m[1] || '').trim(), 10);
              return Number.isInteger(n) && n > 0 ? n : 0;
            }

            function parseJsonBlock(commentBody) {
              const m = String(commentBody || '').match(/```(?:json)?\s*([\s\S]*?)```/i);
              if (!m || !m[1]) return null;
              try {
                return JSON.parse(m[1]);
              } catch {
                return null;
              }
            }

            function parseRequestComment(body, url) {
              const txt = String(body || '');
              const targetHash = (txt.match(/Target hash \(merge state\):\s*`([a-f0-9]{64})`/i) || [])[1] || '';
              const required = Number.parseInt((txt.match(/Required signatures:\s*\*\*([0-9]+)\*\*/i) || [])[1] || '', 10);
              const requiredSignatures = Number.isInteger(required) && required > 0 ? required : 0;

              const eligibleLine = (txt.match(/Eligible signers:\s*\*\*([^*]+)\*\*/i) || [])[1] || '';
              const eligibleSigners = uniq(Array.from(eligibleLine.matchAll(/@([A-Za-z0-9-]+)/g)).map((m) => normalizeLogin(m[1]))).filter(Boolean);

              const links = {};
              for (const m of txt.matchAll(/-\s*@([A-Za-z0-9-]+)[^\n]*\]\((https?:\/\/[^)]+)\)/g)) {
                const login = normalizeLogin(m[1]);
                if (login) links[login] = m[2];
              }

              return {
                url,
                targetHash: targetHash.toLowerCase(),
                requiredSignatures,
                eligibleSigners,
                links,
              };
            }

            async function ensureStateLabelsExist() {
              for (const name of SIGNATURE_STATE_LABELS) {
                try {
                  await github.rest.issues.getLabel({ owner: repo.owner, repo: repo.repo, name });
                } catch (err) {
                  if (err.status === 404) {
                    const meta = LABEL_META[name];
                    await github.rest.issues.createLabel({
                      owner: repo.owner,
                      repo: repo.repo,
                      name,
                      color: meta.color,
                      description: meta.description,
                    });
                    continue;
                  }
                  throw err;
                }
              }
            }

            async function syncStateLabel(prNumber, targetLabel) {
              const current = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                per_page: 100,
              });
              const currentNames = current.map((l) => String(l.name || ''));
              const toRemove = currentNames.filter((name) => SIGNATURE_STATE_LABELS.includes(name) && name !== targetLabel);
              for (const name of toRemove) {
                try {
                  await github.rest.issues.removeLabel({ owner: repo.owner, repo: repo.repo, issue_number: prNumber, name });
                } catch (err) {
                  if (err.status !== 404) throw err;
                }
              }
              if (!currentNames.includes(targetLabel)) {
                await github.rest.issues.addLabels({
                  owner: repo.owner,
                  repo: repo.repo,
                  issue_number: prNumber,
                  labels: [targetLabel],
                });
              }
            }

            async function evaluatePr(pr) {
              const prNumber = pr.number;
              const [comments, files] = await Promise.all([
                github.paginate(github.rest.issues.listComments, {
                  owner: repo.owner,
                  repo: repo.repo,
                  issue_number: prNumber,
                  per_page: 100,
                }),
                github.paginate(github.rest.pulls.listFiles, {
                  owner: repo.owner,
                  repo: repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                }),
              ]);

              const paths = files.map((f) => String(f.filename || ''));
              const hasPath = (prefix) => paths.some((p) => p.startsWith(prefix));
              const policyReasons = [];
              if (hasPath('sops/')) policyReasons.push('SOP files (/sops)');
              if (hasPath('records/')) policyReasons.push('records (/records)');
              if (hasPath('records/management-reviews/')) policyReasons.push('management review records (/records/management-reviews)');
              if (hasPath('matrices/')) policyReasons.push('matrix/role files (/matrices)');

              const explicitRequired = parseRequiredSignaturesFromBody(pr.body || '');
              const baseRequiredReviewers = explicitRequired > 0 ? Math.max(0, explicitRequired - 1) : 0;
              const policyRequiredReviewers = policyReasons.length > 0 ? 1 : 0;
              const requiredReviewers = Math.max(baseRequiredReviewers, policyRequiredReviewers);
              const policySignatureRequired = explicitRequired > 0 || policyReasons.length > 0;
              const computedRequiredSignatures = policySignatureRequired
                ? Math.max(explicitRequired || 1, requiredReviewers + 1)
                : 0;

              const requestComments = comments
                .filter((c) => {
                  const b = String(c.body || '');
                  return b.includes('<!-- signature-native-signature-request -->') || b.includes('<!-- part11-native-signature-request -->');
                })
                .sort((a, b) => Date.parse(a.created_at || 0) - Date.parse(b.created_at || 0));

              const latestRequest = requestComments.length > 0 ? requestComments[requestComments.length - 1] : null;
              const request = latestRequest ? parseRequestComment(latestRequest.body || '', latestRequest.html_url || '') : null;

              const signatureRequested = Boolean(request);
              const eligibleSigners = (request?.eligibleSigners || []).filter(Boolean);
              const targetHash = (request?.targetHash || '').toLowerCase();

              const signedBy = new Set();
              for (const c of comments) {
                const body = String(c.body || '');
                const hasNative = body.includes('<!-- signature-native-attestation -->') || body.includes('<!-- part11-native-attestation -->');
                const hasWorker = body.includes('<!-- SIGNATURE_ATTESTATION_V1 -->') || body.includes('<!-- PART11_ATTESTATION_V1 -->');
                if (!hasNative && !hasWorker) continue;

                const payload = parseJsonBlock(body);
                if (!payload || typeof payload !== 'object') continue;

                let signer = '';
                let hash = '';
                if (hasNative) {
                  signer = normalizeLogin(payload.actor_login);
                  hash = String(payload.target_hash || '').toLowerCase();
                } else {
                  signer = normalizeLogin(payload.user_id);
                  hash = String(payload.commit_hash || '').toLowerCase();
                }
                if (!signer) continue;
                if (targetHash && hash && hash !== targetHash) continue;
                signedBy.add(signer);
              }

              const signedEligible = eligibleSigners.filter((s) => signedBy.has(s));
              const capturedCount = eligibleSigners.length > 0 ? signedEligible.length : signedBy.size;
              const missingSigners = eligibleSigners.filter((s) => !signedBy.has(s));
              const hasAttestationEvidence = signedBy.size > 0;

              const signatureRequired = policySignatureRequired || signatureRequested || hasAttestationEvidence;
              let requiredSignatures = request?.requiredSignatures || 0;
              if (requiredSignatures <= 0) {
                requiredSignatures = computedRequiredSignatures;
              }
              if (signatureRequired && requiredSignatures <= 0) {
                requiredSignatures = Math.max(capturedCount, 1);
              }

              const blockedNoRequest = policySignatureRequired && !request;
              const outstanding = signatureRequired && (
                blockedNoRequest ||
                (eligibleSigners.length > 0 ? missingSigners.length > 0 : capturedCount < requiredSignatures)
              );

              const stateLabel = blockedNoRequest
                ? 'signature/blocked'
                : (!signatureRequired ? 'signature/not-required' : (outstanding ? 'signature/outstanding' : 'signature/complete'));

              return {
                number: prNumber,
                title: pr.title,
                url: pr.html_url,
                mergedAt: pr.merged_at || '',
                stateLabel,
                signatureRequired,
                outstanding,
              };
            }

            function pickStatusOptionId(statusField, names) {
              const options = statusField?.options || [];
              const lowered = names.map((n) => n.toLowerCase());
              const hit = options.find((o) => lowered.includes(String(o.name || '').toLowerCase()));
              return hit?.id || null;
            }

            async function getProjectV2(ownerLogin, number) {
              const query = `
                query($owner:String!, $number:Int!) {
                  repositoryOwner(login:$owner) {
                    __typename
                    ... on User {
                      projectV2(number:$number) {
                        id
                        title
                        url
                        fields(first:50) {
                          nodes {
                            ... on ProjectV2FieldCommon { id name }
                            ... on ProjectV2SingleSelectField { id name options { id name } }
                          }
                        }
                      }
                    }
                    ... on Organization {
                      projectV2(number:$number) {
                        id
                        title
                        url
                        fields(first:50) {
                          nodes {
                            ... on ProjectV2FieldCommon { id name }
                            ... on ProjectV2SingleSelectField { id name options { id name } }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              const resp = await github.graphql(query, { owner: ownerLogin, number });
              const owner = resp.repositoryOwner;
              const project = owner?.projectV2;
              if (!project) {
                throw new Error(`ProjectV2 #${number} was not found for owner ${ownerLogin}.`);
              }
              return project;
            }

            async function listProjectItems(projectId) {
              const items = [];
              let cursor = null;
              while (true) {
                const query = `
                  query($projectId:ID!, $cursor:String) {
                    node(id:$projectId) {
                      ... on ProjectV2 {
                        items(first:100, after:$cursor) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            id
                            content {
                              __typename
                              ... on Issue { id number repository { nameWithOwner } }
                              ... on PullRequest { id number repository { nameWithOwner } }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
                const resp = await github.graphql(query, { projectId, cursor });
                const conn = resp?.node?.items;
                if (!conn) break;
                for (const node of conn.nodes || []) {
                  const content = node?.content;
                  if (!content?.id) continue;
                  items.push({ itemId: node.id, contentId: content.id, kind: content.__typename, repo: content.repository?.nameWithOwner || '' });
                }
                if (!conn.pageInfo?.hasNextPage) break;
                cursor = conn.pageInfo.endCursor;
              }
              return items;
            }

            async function ensureProjectItem(projectId, contentId, existingMap) {
              if (existingMap.has(contentId)) return existingMap.get(contentId);
              const mutation = `
                mutation($projectId:ID!, $contentId:ID!) {
                  addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                    item { id }
                  }
                }
              `;
              const resp = await github.graphql(mutation, { projectId, contentId });
              const itemId = resp?.addProjectV2ItemById?.item?.id;
              if (!itemId) throw new Error('Failed to add item to project.');
              existingMap.set(contentId, itemId);
              return itemId;
            }

            async function setProjectStatus(projectId, itemId, statusFieldId, optionId) {
              if (!statusFieldId || !optionId) return;
              const mutation = `
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(input:{
                    projectId:$projectId,
                    itemId:$itemId,
                    fieldId:$fieldId,
                    value:{ singleSelectOptionId:$optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `;
              await github.graphql(mutation, {
                projectId,
                itemId,
                fieldId: statusFieldId,
                optionId,
              });
            }

            await ensureStateLabelsExist();

            const closed = await github.paginate(github.rest.pulls.list, {
              owner: repo.owner,
              repo: repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });

            const horizonMs = horizonDays * 24 * 60 * 60 * 1000;
            const now = Date.now();
            const mergedCandidates = closed
              .filter((p) => p.merged_at && (now - Date.parse(p.merged_at)) <= horizonMs)
              .slice(0, maxClosedPrs);

            const prResults = [];
            for (const pr of mergedCandidates) {
              const result = await evaluatePr(pr);
              prResults.push(result);
              await syncStateLabel(result.number, result.stateLabel);
            }

            let project;
            try {
              project = await getProjectV2(repo.owner, projectNumber);
            } catch (err) {
              const msg = String(err?.message || err || '');
              if (msg.includes('INSUFFICIENT_SCOPES') || msg.includes('read:project')) {
                throw new Error(
                  'Project sync requires a token with project scopes. Configure repository secret PROJECT_AUTOMATION_TOKEN with scopes: repo, read:project, project.'
                );
              }
              throw err;
            }
            const statusField = (project.fields?.nodes || []).find((f) => String(f.name || '').toLowerCase() === 'status');
            if (!statusField || !statusField.id) {
              throw new Error(`Project ${project.url} does not have a Status field.`);
            }

            const todoOptionId = pickStatusOptionId(statusField, ['Todo', 'To do', 'Backlog', 'Inbox', 'Ready']);
            const doneOptionId = pickStatusOptionId(statusField, ['Done', 'Complete', 'Closed']);
            if (!todoOptionId || !doneOptionId) {
              throw new Error(`Project ${project.url} Status field must include Todo/Done-like options.`);
            }

            const existingItems = await listProjectItems(project.id);
            const itemByContentId = new Map(existingItems.map((x) => [x.contentId, x.itemId]));

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: repo.owner,
              repo: repo.repo,
              state: 'open',
              per_page: 100,
            });

            const issueTargets = openIssues.filter((i) => !i.pull_request);
            for (const issue of issueTargets) {
              const itemId = await ensureProjectItem(project.id, issue.node_id, itemByContentId);
              await setProjectStatus(project.id, itemId, statusField.id, todoOptionId);
            }

            const prTargets = prResults.filter((r) => r.signatureRequired || r.stateLabel === 'signature/not-required');
            for (const pr of prTargets) {
              const full = await github.rest.pulls.get({ owner: repo.owner, repo: repo.repo, pull_number: pr.number });
              const contentId = full.data.node_id;
              const itemId = await ensureProjectItem(project.id, contentId, itemByContentId);
              const optionId = (pr.stateLabel === 'signature/outstanding' || pr.stateLabel === 'signature/blocked')
                ? todoOptionId
                : doneOptionId;
              await setProjectStatus(project.id, itemId, statusField.id, optionId);
            }

            core.info(`Synced Project #${projectNumber} (${project.url}): ${issueTargets.length} open issues + ${prTargets.length} merged PRs.`);
