name: Manual Training Onboarding PR

on:
  workflow_dispatch:
    inputs:
      trainee_user_id:
        description: "Training user ID as defined in matrices/training_matrix.yml users[]"
        required: true
        default: "AliakseiT"
      trainee_github_login:
        description: "GitHub login that must review this onboarding review PR"
        required: true
        default: "AliakseiT"

permissions:
  contents: write
  pull-requests: write

jobs:
  create_onboarding_review_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build review metadata from matrix
        id: plan
        env:
          TRAINEE_USER_ID: ${{ github.event.inputs.trainee_user_id }}
          TRAINEE_GH_LOGIN: ${{ github.event.inputs.trainee_github_login }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python -m pip install --quiet pyyaml
          python <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          import yaml

          def extract_sop_id(text: str) -> str:
            m = re.search(r"(SOP-\d+)", str(text or ""), flags=re.IGNORECASE)
            return m.group(1).upper() if m else ""

          trainee_user_id = os.environ["TRAINEE_USER_ID"].strip()
          trainee_login = os.environ["TRAINEE_GH_LOGIN"].strip()
          run_id = os.environ["RUN_ID"].strip()

          matrix = yaml.safe_load(Path("matrices/training_matrix.yml").read_text(encoding="utf-8")) or {}
          roles = matrix.get("roles", {}) or {}

          roles_for_user = []
          required_sops = set()

          for role_name, role_def in roles.items():
            users = [str(u).strip() for u in (role_def.get("users", []) or []) if str(u).strip()]
            if not any(u.lower() == trainee_user_id.lower() for u in users):
              continue

            roles_for_user.append(role_name)
            for item in (role_def.get("required_sops", []) or []):
              sop_id = extract_sop_id(item)
              if sop_id:
                required_sops.add(sop_id)

          if not roles_for_user:
            raise RuntimeError(
              f"User '{trainee_user_id}' is not mapped to any role in matrices/training_matrix.yml."
            )
          if not required_sops:
            raise RuntimeError(
              f"User '{trainee_user_id}' has no SOPs mapped through role requirements."
            )

          first_commit = subprocess.check_output(
            ["git", "rev-list", "--max-parents=0", "main"],
            text=True,
          ).splitlines()[0].strip()

          slug = re.sub(r"[^a-z0-9-]+", "-", trainee_user_id.lower()).strip("-") or "user"
          baseline_branch = f"training/review-baseline-{slug}-{run_id}"

          pr_title = f"Training review: {trainee_user_id} full QMS state vs initial baseline"
          roles_csv = ", ".join(sorted(roles_for_user))
          sop_csv = ", ".join(sorted(required_sops))

          pr_body = [
            "### Training Review Record",
            "- [x] This PR is review-only onboarding evidence (do not merge).",
            f"- [x] Baseline branch points to first commit `{first_commit[:12]}`.",
            "- [x] Head is `main` to show full current QMS state.",
            f"- **Trainee GitHub Login:** @{trainee_login}",
            f"- **Training User ID:** {trainee_user_id}",
            f"- **Roles In Scope:** {roles_csv}",
            f"- **SOP IDs In Scope:** {sop_csv}",
            "",
            "### Reviewer Task",
            "1. Review `Files changed` in this PR as full onboarding walkthrough.",
            "2. Approve this PR as trainee acknowledgement.",
            "3. Close without merge (review-only artifact).",
            "",
            "### Part 11 Signature Requirements",
            "- **Meaning of Signature:** Approved Training Review Acknowledgement",
            "- **Signer Roles:** Quality Assurance Lead; Management Representative",
            "- **Required Signatures:** 2",
          ]
          Path("pr_body.md").write_text("\n".join(pr_body) + "\n", encoding="utf-8")

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
            fh.write(f"first_commit={first_commit}\n")
            fh.write(f"baseline_branch={baseline_branch}\n")
            fh.write(f"trainee_login={trainee_login}\n")
            fh.write(f"pr_title={pr_title}\n")
            fh.write(f"roles_csv={roles_csv}\n")
            fh.write(f"sop_csv={sop_csv}\n")
          PY

      - name: Create baseline branch at first commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --detach "${{ steps.plan.outputs.first_commit }}"
          git checkout -b "${{ steps.plan.outputs.baseline_branch }}"
          git push --set-upstream origin "${{ steps.plan.outputs.baseline_branch }}"

      - name: Open onboarding review PR
        id: open_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TRAINING_PR_TOKEN != '' && secrets.TRAINING_PR_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = `${{ steps.plan.outputs.baseline_branch }}`;
            const head = 'main';
            const title = `${{ steps.plan.outputs.pr_title }}`;
            const traineeLogin = `${{ steps.plan.outputs.trainee_login }}`;
            const body = require('fs').readFileSync('pr_body.md', 'utf-8');

            async function retry(fn, attempts = 6, delayMs = 3000) {
              let err;
              for (let i = 1; i <= attempts; i++) {
                try {
                  return await fn();
                } catch (e) {
                  err = e;
                  core.warning(`Attempt ${i}/${attempts} failed: ${e.message}`);
                  if (i < attempts) {
                    await new Promise((resolve) => setTimeout(resolve, delayMs));
                  }
                }
              }
              throw err;
            }

            let pr;
            try {
              const created = await retry(() => github.rest.pulls.create({
                owner,
                repo,
                title,
                head,
                base,
                body,
              }));
              pr = created.data;
            } catch (e) {
              if (e.status === 403) {
                core.setFailed(
                  `PR creation blocked (403). Either enable repository setting 'Allow GitHub Actions to create and approve pull requests' or set secret TRAINING_PR_TOKEN with repo write access. Original error: ${e.message}`
                );
                return;
              }
              throw e;
            }

            try {
              await retry(() => github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: ['training', 'onboarding', 'review-only'],
              }), 2, 1000);
            } catch (e) {
              core.warning(`Could not add labels: ${e.message}`);
            }

            try {
              await retry(() => github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number: pr.number,
                reviewers: [traineeLogin],
              }), 2, 1000);
            } catch (e) {
              core.warning(`Could not request reviewer @${traineeLogin}: ${e.message}`);
            }

            core.info(`Created onboarding review PR: ${pr.html_url}`);
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_url', pr.html_url);
