name: 1.3 Auto Merge After Assigned Approvals
run-name: 1.3 Auto-Merge Gate

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, converted_to_draft, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto_merge:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token for PR merge/comment
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.QMS_BOT_APP_ID }}
          private-key: ${{ secrets.QMS_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Enable auto-merge when assigned reviewers approved
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull request context; skipping.');
              return;
            }
            if (pr.state !== 'open') {
              core.info(`PR #${pr.number} is not open; skipping.`);
              return;
            }
            const labels = (pr.labels || []).map((l) => String(l.name || '').toLowerCase());
            if (labels.includes('review-only')) {
              core.info(`PR #${pr.number} is marked review-only; auto-merge skipped.`);
              return;
            }

            const body = pr.body || '';
            const sigMatch = body.match(/\*\*Required Signatures:\*\*\s*([^\n]+)/i);
            let requiredSignatures = sigMatch ? Number.parseInt(sigMatch[1].trim(), 10) : 1;
            if (!Number.isInteger(requiredSignatures) || requiredSignatures < 1) {
              requiredSignatures = 1;
            }
            const baseRequiredReviewerApprovals = Math.max(0, requiredSignatures - 1);

            const fresh = (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            })).data;
            if (fresh.state !== 'open') {
              core.info(`PR #${pr.number} is not open; skipping.`);
              return;
            }
            if (fresh.draft) {
              if (fresh.auto_merge) {
                try {
                  await github.graphql(
                    `mutation($pullRequestId: ID!) {
                      disablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId}) {
                        pullRequest { number }
                      }
                    }`,
                    { pullRequestId: fresh.node_id }
                  );
                  core.info(`Disabled auto-merge for draft PR #${pr.number}.`);
                } catch (error) {
                  core.warning(`Could not disable auto-merge for draft PR #${pr.number}: ${error.message}`);
                }
              } else {
                core.info(`PR #${pr.number} is draft; auto-merge skipped.`);
              }
              return;
            }
            const headSha = (fresh.head?.sha || '').toLowerCase();
            const author = String(fresh.user?.login || '').toLowerCase();
            const requested = (fresh.requested_reviewers || []).map((r) => String(r.login || '').toLowerCase()).filter(Boolean);
            const marker = '<!-- signature-auto-reviewers -->';
            const legacyMarker = '<!-- part11-auto-reviewers -->';
            const automationBotLogins = new Set(['dearauditor-open-qms-bot', 'dearauditor-open-qms-bot[bot]', 'dearauditor-qms-baseline-bot', 'dearauditor-qms-baseline-sign', 'github-actions[bot]']);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const markerComments = comments
              .filter((c) => ((c.body || '').includes(marker) || (c.body || '').includes(legacyMarker)) && automationBotLogins.has(String(c.user?.login || '').toLowerCase()))
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            const latestMarkerBody = markerComments.length > 0 ? String(markerComments[markerComments.length - 1].body || '') : '';
            const parseAssignedReviewers = (body) => {
              const lineMatch = String(body || '').match(/Assigned reviewers:\s*([^\n]+)/i);
              return lineMatch
                ? Array.from((lineMatch[1] || '').matchAll(/@([A-Za-z0-9-]+)/g)).map((m) => m[1].toLowerCase())
                : [];
            };
            const parseBooleanLine = (body, label) => {
              const match = String(body || '').match(new RegExp(`${label}:\\s*\`?(yes|no)\`?`, 'i'));
              return match ? match[1].toLowerCase() === 'yes' : null;
            };
            const parseIntegerLine = (body, label) => {
              const match = String(body || '').match(new RegExp(`${label}:\\s*\`?(\\d+)\`?`, 'i'));
              return match ? Number.parseInt(match[1], 10) : null;
            };

            let requiredReviewerApprovals = null;
            let reviewerPool = [];
            let policySource = '';
            let coapprovalReasons = [];
            if (latestMarkerBody) {
              const explicitApprovalRequired = parseBooleanLine(latestMarkerBody, 'Reviewer approval required for merge');
              const explicitRequiredApprovals = parseIntegerLine(latestMarkerBody, 'Required reviewer approvals for merge');
              if (explicitApprovalRequired !== null || explicitRequiredApprovals !== null) {
                requiredReviewerApprovals = explicitApprovalRequired === false
                  ? 0
                  : explicitRequiredApprovals ?? Math.max(1, baseRequiredReviewerApprovals);
                reviewerPool = Array.from(new Set([
                  ...parseAssignedReviewers(latestMarkerBody),
                  ...requested,
                ]));
                policySource = 'assignment comment';
              }
            }
            if (requiredReviewerApprovals === null) {
              const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              const paths = changedFiles.map((f) => String(f.filename || ''));
              const hasPath = (prefix) => paths.some((p) => p.startsWith(prefix));
              if (hasPath('qm/') || hasPath('sops/')) coapprovalReasons.push('controlled documents (/qm, /sops)');
              if (hasPath('records/')) coapprovalReasons.push('records (/records)');
              if (hasPath('records/management-reviews/')) coapprovalReasons.push('management review records (/records/management-reviews)');
              if (hasPath('matrices/')) coapprovalReasons.push('matrix/role files (/matrices)');
              const policyMinimumApprovals = coapprovalReasons.length > 0 ? 1 : 0;
              requiredReviewerApprovals = Math.max(baseRequiredReviewerApprovals, policyMinimumApprovals);
              policySource = 'path fallback';
            }
            if (requiredReviewerApprovals > 0 && reviewerPool.length === 0 && policySource === 'assignment comment') {
              core.setFailed(`PR #${pr.number} requires reviewer approval for merge, but the assigned reviewer pool is empty in the automation comment.`);
              return;
            }
            if (requiredReviewerApprovals === 0) {
              if (fresh.auto_merge) {
                try {
                  await github.graphql(
                    `mutation($pullRequestId: ID!) {
                      disablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId}) {
                        pullRequest { number }
                      }
                    }`,
                    { pullRequestId: fresh.node_id }
                  );
                  core.info(`Disabled auto-merge for PR #${pr.number}; reviewer approval is not required, so manual merge is expected.`);
                } catch (error) {
                  core.warning(`Could not disable auto-merge for PR #${pr.number}: ${error.message}`);
                }
              } else {
                core.info(`PR #${pr.number} does not require reviewer approval; auto-merge remains disabled and manual merge is expected.`);
              }
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestReviewByUser = new Map();
            for (const review of reviews) {
              const login = (review.user?.login || '').trim();
              if (!login) continue;
              latestReviewByUser.set(login.toLowerCase(), {
                state: String(review.state || '').toUpperCase(),
                commitId: String(review.commit_id || '').toLowerCase(),
              });
            }

            const approvedReviewers = Array.from(latestReviewByUser.entries())
              .filter(([login, review]) => login !== author && review.state === 'APPROVED')
              .map(([login]) => login);
            const approvedOnHead = Array.from(latestReviewByUser.entries())
              .filter(([login, review]) => login !== author && review.state === 'APPROVED' && review.commitId === headSha)
              .map(([login]) => login);
            const approvedOnHeadSet = new Set(approvedOnHead);
            if (requiredReviewerApprovals > 0 && reviewerPool.length > 0 && reviewerPool.length < requiredReviewerApprovals) {
              core.info(
                `PR #${pr.number} requires ${requiredReviewerApprovals} reviewer approval(s) (author auto-signs 1), but only ${reviewerPool.length} reviewer candidate(s) were resolved.${coapprovalReasons.length > 0 ? ` Co-approval scope matched: ${coapprovalReasons.join('; ')}` : ''}`
              );
              return;
            }

            const approvedFromPool = reviewerPool.length > 0
              ? reviewerPool.filter((login) => approvedOnHeadSet.has(login.toLowerCase()))
              : approvedOnHead;
            if (requiredReviewerApprovals > 0 && approvedFromPool.length < requiredReviewerApprovals) {
              const pending = reviewerPool.filter((login) => !approvedOnHeadSet.has(login.toLowerCase()));
              const stale = (reviewerPool.length > 0 ? reviewerPool : approvedReviewers).filter((login) => approvedReviewers.includes(login.toLowerCase()) && !approvedOnHeadSet.has(login.toLowerCase()));
              if (stale.length > 0) {
                core.info(`Found stale approvals on older commits from: ${stale.map((x) => '@' + x).join(', ')}`);
              }
              core.info(
                reviewerPool.length > 0
                  ? `Waiting for ${requiredReviewerApprovals - approvedFromPool.length} more approval(s) from reviewer pool: ${pending.map((x) => '@' + x).join(', ')}`
                  : `Waiting for ${requiredReviewerApprovals - approvedFromPool.length} more non-author approval(s) on the current head.`
              );
              return;
            }

            if (fresh.auto_merge) {
              core.info(`Auto-merge already enabled for PR #${pr.number}.`);
              return;
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: SQUASH}) {
                    pullRequest { number }
                  }
                }`,
                { pullRequestId: fresh.node_id }
              );
              core.info(`Enabled auto-merge for PR #${pr.number}.`);
            } catch (error) {
              core.warning(`Could not enable auto-merge via GraphQL: ${error.message}`);
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                });
                core.info(`Merged PR #${pr.number} directly.`);
                core.info(`Signature request will be posted by Issue-to-PR post-merge workflow for PR #${pr.number}.`);
              } catch (mergeError) {
                core.warning(`Direct merge attempt failed for PR #${pr.number}: ${mergeError.message}`);
                core.setFailed(
                  `PR #${pr.number} could not be merged by automation. Verify GITHUB_TOKEN write permissions and repository action settings.`
                );
              }
            }
            
